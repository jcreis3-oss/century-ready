<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Century Ready — Civil War Century Training</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   CENTURY READY — DESIGN SYSTEM
   Theme: Modern Athletic — light canvas, energetic gradient accents,
   glassy dark hero header. Inspired by Strava/Peloton-grade sports tech.
   Display font: Outfit (geometric, confident) · Body: Inter · Data: Roboto Mono
   ============================================================ */
:root{
  /* ink */
  --ink:#10182B;
  --ink-700:#26314A;
  --ink-600:#4B5568;
  --ink-400:#8992A6;
  --ink-200:#D7DCE6;

  /* canvas */
  --bg:#F5F6FB;
  --bg-alt:#FFFFFF;
  --grey-50:#F6F7FB;
  --grey-100:#EEF0F7;
  --grey-200:#E2E5F0;
  --grey-400:#9aa7b2;
  --grey-600:#5c6b78;
  --grey-800:#1c2333;
  --white:#ffffff;

  /* brand navy (from event mark) */
  --navy:#0E1B33;
  --navy-2:#182C52;
  --blue:#3159C9;
  --blue-pale:#EAEEFC;

  /* primary electric gradient — CTAs, active states, key data */
  --grad-1:#00E0B8;
  --grad-2:#5B5FEF;
  --grad-primary: linear-gradient(135deg, var(--grad-1) 0%, var(--grad-2) 100%);
  --teal:#00B894;
  --teal-dark:#00806A;
  --teal-pale:#E1FBF4;
  --indigo:#5B5FEF;
  --indigo-pale:#ECEDFE;

  /* warm energy gradient — highlights, today markers, weather/clock */
  --grad-warm-1:#FF6B4A;
  --grad-warm-2:#FFB020;
  --grad-warm: linear-gradient(135deg, var(--grad-warm-1) 0%, var(--grad-warm-2) 100%);
  --orange:#E0894F;
  --orange-pale:#FFF1E4;

  /* sky gradient — weather */
  --grad-sky: linear-gradient(135deg, #2E9BF0 0%, #6C63FF 100%);

  /* status */
  --green:#16C784;
  --green-pale:#E4FBF1;
  --yellow:#FFB020;
  --yellow-pale:#FFF6E0;
  --red:#FF4D5E;
  --red-pale:#FFE9EB;

  --radius-sm:8px;
  --radius-md:14px;
  --radius-lg:20px;
  --shadow-sm:0 1px 2px rgba(16,24,43,0.05), 0 1px 1px rgba(16,24,43,0.04);
  --shadow-md:0 6px 20px rgba(16,24,43,0.08);
  --shadow-lg:0 20px 48px rgba(16,24,43,0.18);
  --shadow-glow: 0 8px 24px rgba(91,95,239,0.28);
  --shadow-glow-warm: 0 8px 24px rgba(255,107,74,0.30);

  --font-display:'Outfit', 'Inter', sans-serif;
  --font-body:'Inter', sans-serif;
  --font-mono:'Roboto Mono', monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--font-body);
  background:
    radial-gradient(1200px 600px at 90% -10%, rgba(91,95,239,0.06) 0%, rgba(91,95,239,0) 60%),
    radial-gradient(900px 500px at -10% 10%, rgba(0,224,184,0.07) 0%, rgba(0,224,184,0) 55%),
    var(--bg);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  line-height:1.5;
}
h1,h2,h3,h4{font-family:var(--font-display); color:var(--navy); margin:0; font-weight:700; letter-spacing:-0.01em;}
p{margin:0;}
button{font-family:inherit; cursor:pointer;}
input,select,textarea{font-family:inherit; font-size:14px;}
::selection{background:var(--teal-pale);}
@keyframes fadeSlideIn{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }
@keyframes pulseGlow{ 0%,100%{box-shadow:0 0 0 0 rgba(0,224,184,0.5);} 50%{box-shadow:0 0 0 6px rgba(0,224,184,0);} }
@keyframes shimmer{ 0%{background-position:-200% 0;} 100%{background-position:200% 0;} }

/* ============ LAYOUT ============ */
#root{max-width:1180px; margin:0 auto; padding:0 20px 80px;}

.app-header{
  background:
    radial-gradient(700px 400px at 88% -20%, rgba(0,224,184,0.35) 0%, rgba(0,224,184,0) 60%),
    radial-gradient(600px 380px at 10% 120%, rgba(255,107,74,0.28) 0%, rgba(255,107,74,0) 60%),
    linear-gradient(135deg, var(--navy) 0%, var(--navy-2) 55%, #24407A 100%);
  color:var(--white);
  border-radius:var(--radius-lg);
  padding:30px 30px 24px;
  margin:18px 0 22px;
  position:relative;
  overflow:hidden;
  box-shadow:var(--shadow-lg);
}
.app-header::before{
  content:""; position:absolute; inset:0; opacity:.5; pointer-events:none;
  background-image:radial-gradient(rgba(255,255,255,0.08) 1px, transparent 1px);
  background-size:22px 22px;
}
.app-header .eyebrow{
  font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:#8FE9D6; font-weight:700; position:relative;
}
.app-header h1{
  color:#fff; font-size:30px; margin-top:6px; position:relative; font-weight:800;
  background:linear-gradient(90deg,#fff 0%, #CFE8FF 100%); -webkit-background-clip:text; background-clip:text;
}
.app-header .sub{color:#B9C6E8; font-size:13.5px; margin-top:6px; max-width:560px; position:relative;}

.header-stats{ display:flex; gap:12px; margin-top:20px; flex-wrap:wrap; align-items:stretch; position:relative; z-index:1; }
.stat-pill{
  background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.16);
  backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
  border-radius:var(--radius-md); padding:12px 18px; transition:transform .18s ease, background .18s ease;
}
.stat-pill:hover{ transform:translateY(-2px); background:rgba(255,255,255,0.13); }
.stat-pill.hero{ padding:14px 22px; background:rgba(255,255,255,0.1); }
.stat-pill .num{font-family:var(--font-display); font-size:22px; font-weight:800; color:#fff; line-height:1;}
.stat-pill.hero .num{font-size:30px;}
.stat-pill .lbl{font-size:10.5px; text-transform:uppercase; letter-spacing:.09em; color:#AEC0EA; margin-top:5px; font-weight:600;}

/* Weather + Clock get their own vivid glass treatment, distinct from the neutral stat pills */
.stat-pill.weather-tile{
  background:linear-gradient(135deg, rgba(46,155,240,0.35) 0%, rgba(108,99,255,0.35) 100%);
  border:1px solid rgba(255,255,255,0.35); box-shadow:0 8px 22px rgba(46,155,240,0.25);
}
.stat-pill.clock-tile{
  background:linear-gradient(135deg, rgba(255,107,74,0.35) 0%, rgba(255,176,32,0.32) 100%);
  border:1px solid rgba(255,255,255,0.35); box-shadow:0 8px 22px rgba(255,107,74,0.22);
}

/* ============ NAV ============ */
.tabnav{
  display:flex; gap:4px; background:var(--white); border:1px solid var(--grey-200);
  border-radius:var(--radius-md); padding:5px; margin-bottom:22px; box-shadow:var(--shadow-sm);
  overflow-x:auto; position:sticky; top:10px; z-index:40;
}
.tabnav button{
  border:none; background:transparent; padding:10px 18px; border-radius:10px;
  font-size:13.5px; font-weight:700; color:var(--ink-600); white-space:nowrap;
  transition:all .16s ease;
}
.tabnav button:hover{color:var(--navy); background:var(--grey-50);}
.tabnav button.active{background:var(--grad-primary); color:#fff; box-shadow:var(--shadow-glow);}

/* ============ CARDS ============ */
.card{
  background:var(--bg-alt); border:1px solid var(--grey-200); border-radius:var(--radius-lg);
  padding:22px; margin-bottom:18px; box-shadow:var(--shadow-sm);
  animation:fadeSlideIn .35s ease both; transition:box-shadow .2s ease;
}
.card-header{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; flex-wrap:wrap; gap:8px;}
.card-header h2{font-size:17px;}
.card-header .meta{font-size:12.5px; color:var(--ink-600); font-weight:500;}

.section-title{
  font-family:var(--font-display); font-size:13px; text-transform:uppercase; letter-spacing:.08em;
  color:var(--teal-dark); font-weight:700; margin:26px 0 12px;
  display:flex; align-items:center; gap:8px;
}
.section-title::after{content:""; flex:1; height:1px; background:var(--grey-200);}

/* ============ BADGES ============ */
.badge{
  display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:700;
  padding:4px 10px; border-radius:20px; text-transform:uppercase; letter-spacing:.04em;
}
.badge-rest{background:var(--grey-100); color:var(--ink-600);}
.badge-indoor{background:var(--blue-pale); color:var(--blue);}
.badge-outdoor{background:var(--teal-pale); color:var(--teal-dark);}
.badge-run{background:#FFEDE3; color:#C1502B;}
.badge-strength{background:var(--orange-pale); color:#a15a26;}
.badge-mobility{background:#F1ECFE; color:#6B4FE0;}
.badge-recovery{background:var(--grey-100); color:var(--ink-600);}
.badge-race{background:linear-gradient(135deg,#FF4D5E,#FF8A4C); color:#fff;}
.badge-foundation{background:var(--blue-pale); color:var(--blue);}
.badge-build{background:var(--teal-pale); color:var(--teal-dark);}
.badge-recoveryweek{background:var(--grey-100); color:var(--ink-600);}
.badge-peak{background:var(--orange-pale); color:#a15a26;}
.badge-taper{background:#FFE9EB; color:var(--red);}

/* ============ DASHBOARD TODAY ============ */
.today-banner{display:flex; justify-content:space-between; align-items:flex-start; gap:16px; flex-wrap:wrap;}
.today-banner .dateline{font-size:12.5px; color:var(--ink-600); font-weight:700; text-transform:uppercase; letter-spacing:.05em;}
.today-banner h2{font-size:22px; margin-top:2px;}

.workout-item{
  border:1px solid var(--grey-200); border-radius:var(--radius-md); margin-bottom:12px; overflow:hidden;
  background:var(--grey-50); transition:border-color .15s ease, box-shadow .15s ease, background .2s ease;
}
.workout-item.completed{
  background:var(--green-pale); border-color:var(--green);
}
.workout-item.completed .wi-head:hover{ background:rgba(22,199,132,0.12); }

/* whole-day completion highlight, used in Dashboard, Schedule list, and Schedule calendar */
.day-complete-bg{ background:var(--green-pale) !important; border-color:var(--green) !important; }
.day-row.day-complete-bg{ border-radius:var(--radius-md); }
.workout-item:hover{ box-shadow:var(--shadow-sm); }
.workout-item .wi-head{
  display:flex; justify-content:space-between; align-items:center; padding:14px 16px; cursor:pointer; gap:10px;
}
.workout-item .wi-head:hover{background:var(--grey-100);}
.wi-icon{
  width:38px; height:38px; border-radius:11px; display:flex; align-items:center; justify-content:center;
  flex-shrink:0; background:var(--grad-primary); color:#fff; box-shadow:var(--shadow-glow);
}
.wi-icon svg{width:20px; height:20px;}
.wi-icon.warm{background:var(--grad-warm); box-shadow:var(--shadow-glow-warm);}
.wi-icon.neutral{background:var(--ink-200); color:var(--ink-600); box-shadow:none;}
.wi-titlewrap{display:flex; align-items:center; gap:12px; flex:1; min-width:0;}
.workout-item .wi-title{font-weight:700; font-size:14.5px; color:var(--navy); font-family:var(--font-display);}
.workout-item .wi-desc{font-size:12.5px; color:var(--ink-600); margin-top:3px; max-width:520px;}
.wi-right{display:flex; align-items:center; gap:10px; flex-shrink:0;}
.wi-time{font-size:12px; color:var(--ink-600); font-weight:700; white-space:nowrap;}
.chev{transition:transform .18s ease; color:var(--grey-400); flex-shrink:0;}
.chev.open{transform:rotate(180deg);}
.wi-body{padding:0 16px 18px; display:none; border-top:1px solid var(--grey-200); background:#fff;}
.wi-body.open{display:block; animation:fadeSlideIn .25s ease both;}
.wi-target{
  font-size:12.5px; color:var(--ink-700); background:var(--indigo-pale); border-radius:var(--radius-sm);
  padding:9px 12px; margin:14px 0 4px; line-height:1.55;
}
.wi-target b{color:var(--indigo);}

.field-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:10px; margin-top:12px;}
.field{display:flex; flex-direction:column; gap:5px;}
.field label{font-size:10.5px; text-transform:uppercase; letter-spacing:.05em; font-weight:700; color:var(--ink-600);}
.field input, .field select, .field textarea{
  border:1.5px solid var(--grey-200); border-radius:var(--radius-sm); padding:8px 10px; font-size:13.5px;
  background:#fff; color:var(--ink-700); width:100%; transition:border-color .15s, box-shadow .15s;
}
.field input:focus, .field select:focus, .field textarea:focus{outline:none; border-color:var(--indigo); box-shadow:0 0 0 3px var(--indigo-pale);}
.field textarea{resize:vertical; min-height:52px;}
.field.wide{grid-column:1/-1;}
/* logged/actual-entry fields render bold + display-font once they hold a value, echoing the Nutrition widget's numeral style */
.field input.input-logged{ font-family:var(--font-display); font-weight:700; color:var(--navy); }
.field input.input-logged::placeholder{ font-family:var(--font-body); font-weight:400; color:var(--ink-400); opacity:1; }
.field select.input-logged{ font-family:var(--font-display); font-weight:700; color:var(--navy); }

/* compact Hrs:Min:Sec picker — replaces the old full-width triple dropdown */
.time-picker{
  display:inline-flex; align-items:center; gap:1px; background:#fff; border:1.5px solid var(--grey-200);
  border-radius:var(--radius-sm); padding:4px 8px; width:fit-content;
}
.time-picker select{
  border:none !important; background:transparent !important; padding:0 !important; width:auto !important;
  font-size:13px; font-family:var(--font-display); font-weight:700; color:var(--navy); appearance:menulist;
  text-align:right;
}
.time-picker select:focus{ outline:none; box-shadow:none; }
.time-picker .tp-unit{ font-size:10.5px; color:var(--ink-400); font-weight:600; margin-right:4px; }
.time-picker .tp-sep{ color:var(--ink-200); font-weight:700; margin:0 2px; }

.save-row{display:flex; align-items:center; gap:10px; margin-top:14px; flex-wrap:wrap;}
.btn{
  border:none; border-radius:var(--radius-sm); padding:10px 18px; font-size:13px; font-weight:700;
  transition:transform .12s ease, box-shadow .15s ease, background .15s ease, border-color .15s ease, color .15s ease;
}
.btn-primary{background:var(--grad-primary); color:#fff; box-shadow:var(--shadow-glow);}
.btn-primary:hover{transform:translateY(-2px); box-shadow:0 12px 28px rgba(91,95,239,0.36);}
.btn-primary:active{transform:translateY(0) scale(.98); box-shadow:0 4px 10px rgba(91,95,239,0.3);}
.btn-ghost{background:#fff; color:var(--ink-600); border:1.5px solid var(--grey-200);}
.btn-ghost:hover{border-color:var(--indigo); color:var(--indigo); background:var(--indigo-pale);}
.btn-ghost:active{transform:scale(.97);}
.save-tick{font-size:12px; color:var(--teal-dark); font-weight:700; opacity:0; transition:opacity .2s;}
.save-tick.show{opacity:1;}

/* week strip */
.week-strip{display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; margin-top:14px;}
.day-pill{
  flex:1; min-width:78px; border:1.5px solid var(--grey-200); border-radius:var(--radius-md);
  padding:10px 6px; text-align:center; cursor:pointer; background:#fff; transition:all .15s;
}
.day-pill:hover{border-color:var(--indigo); transform:translateY(-2px); box-shadow:var(--shadow-sm);}
.day-pill.today{border-color:transparent; background:var(--grad-warm); box-shadow:var(--shadow-glow-warm);}
.day-pill.today .dp-dow, .day-pill.today .dp-date, .day-pill.today .dp-tag{color:#fff;}
.day-pill.selected{box-shadow:0 0 0 2px var(--navy) inset;}
.day-pill .dp-dow{font-size:10px; color:var(--ink-600); font-weight:700; text-transform:uppercase;}
.day-pill .dp-date{font-size:15px; font-weight:800; color:var(--navy); margin:2px 0; font-family:var(--font-display);}
.day-pill .dp-tag{font-size:9.5px; color:var(--ink-600); font-weight:600;}
.day-pill .dp-dot{width:6px; height:6px; border-radius:50%; margin:4px auto 0;}

/* nutrition widget */
.nutri-grid{display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin-top:6px;}
@media(max-width:900px){.nutri-grid{grid-template-columns:repeat(3,1fr);}}
@media(max-width:700px){.nutri-grid{grid-template-columns:repeat(2,1fr);}}
.nutri-box{background:var(--grey-50); border:1px solid var(--grey-200); border-radius:var(--radius-md); padding:14px; transition:transform .15s;}
.nutri-box:hover{transform:translateY(-2px);}
.nutri-box .nlabel{font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--ink-600); font-weight:700;}
.nutri-box .nval{font-family:var(--font-display); font-size:20px; color:var(--navy); font-weight:700; margin-top:4px;}
.nutri-box .ntarget{font-size:11.5px; color:var(--ink-600); margin-top:2px;}
.bar-track{height:6px; background:var(--grey-200); border-radius:4px; margin-top:8px; overflow:hidden;}
.bar-fill{height:100%; background:var(--grad-primary); border-radius:4px; transition:width .3s;}
.bar-fill.over{background:var(--grad-warm);}

/* week accordion (schedule tab) */
.week-block{border:1px solid var(--grey-200); border-radius:var(--radius-lg); margin-bottom:14px; overflow:hidden; background:#fff; transition:box-shadow .15s;}
.week-block:hover{box-shadow:var(--shadow-sm);}
.week-block-head{display:flex; align-items:center; justify-content:space-between; padding:16px 20px; cursor:pointer; gap:12px; flex-wrap:wrap;}
.week-block-head:hover{background:var(--grey-50);}
.week-block-head .wtitle{font-family:var(--font-display); font-weight:700; font-size:15.5px; color:var(--navy);}
.week-block-head .wsub{font-size:12px; color:var(--ink-600); margin-top:2px;}
.week-block-body{display:none; border-top:1px solid var(--grey-200);}
.week-block-body.open{display:block; animation:fadeSlideIn .25s ease both;}
.day-row{padding:16px 20px; border-bottom:1px solid var(--grey-100); transition:background .12s;}
.day-row:hover{background:var(--grey-50);}
.day-row:last-child{border-bottom:none;}
.day-row-head{display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap;}
.day-row-head .drtitle{font-weight:700; font-size:14px; color:var(--navy);}
.day-row-head .drdate{font-size:11.5px; color:var(--ink-600); font-weight:600;}

/* profile */
.profile-grid{display:grid; grid-template-columns:1.1fr 1fr; gap:20px;}
@media(max-width:820px){.profile-grid{grid-template-columns:1fr;}}
.zone-table{width:100%; border-collapse:collapse; font-size:13px; margin-top:8px;}
.zone-table th{text-align:left; font-size:10.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--ink-600); padding:6px 8px; border-bottom:1.5px solid var(--grey-200);}
.zone-table td{padding:7px 8px; border-bottom:1px solid var(--grey-100);}
.zone-swatch{width:10px; height:10px; border-radius:3px; display:inline-block; margin-right:7px;}
.calc-box{background:var(--indigo-pale); border-radius:var(--radius-md); padding:16px; margin-top:14px;}
.calc-box .cline{display:flex; justify-content:space-between; font-size:13px; padding:5px 0; border-bottom:1px dashed rgba(91,95,239,0.22);}
.calc-box .cline:last-child{border-bottom:none; font-weight:700; color:var(--indigo);}

/* progress tab */
.progress-table{width:100%; border-collapse:collapse; font-size:13px;}
.progress-table th{text-align:left; padding:9px 10px; font-size:10.5px; text-transform:uppercase; color:var(--ink-600); border-bottom:1.5px solid var(--grey-200); letter-spacing:.04em;}
.progress-table td{padding:9px 10px; border-bottom:1px solid var(--grey-100);}
.progress-table tr{cursor:pointer; transition:background .12s;}
.progress-table tr:hover td{background:var(--indigo-pale);}
.empty-state{text-align:center; padding:40px 20px; color:var(--ink-600);}
.empty-state h3{color:var(--ink-700); margin-bottom:6px;}

.two-col{display:grid; grid-template-columns:1fr 1fr; gap:18px;}
@media(max-width:820px){.two-col{grid-template-columns:1fr;}}

.pill-toggle{display:inline-flex; border:1.5px solid var(--grey-200); border-radius:20px; overflow:hidden; background:#fff;}
.pill-toggle button{border:none; background:#fff; padding:7px 16px; font-size:12px; font-weight:700; color:var(--ink-600); transition:all .15s;}
.pill-toggle button:hover{background:var(--grey-50); color:var(--navy);}
.pill-toggle button.active{background:var(--grad-primary); color:#fff;}

/* generic button-group "choice" control (radio-like, all rendered as <button>) */
.btn-group{display:flex; flex-wrap:wrap; gap:8px;}
.choice-btn{
  border:1.5px solid var(--grey-200); background:#fff; color:var(--ink-600); border-radius:10px;
  padding:8px 14px; font-size:12.5px; font-weight:700; transition:all .15s ease;
}
.choice-btn:hover{border-color:var(--indigo); color:var(--indigo); transform:translateY(-1px);}
.choice-btn:active{transform:translateY(0) scale(.97);}
.choice-btn.active{background:var(--grad-primary); color:#fff; border-color:transparent; box-shadow:var(--shadow-glow);}

.info-callout{
  background:var(--orange-pale); border-left:3px solid var(--orange); border-radius:0 var(--radius-sm) var(--radius-sm) 0;
  padding:12px 14px; font-size:12.5px; color:#7a4622; margin-top:14px; line-height:1.6;
}

/* ============================================================

function dateAdd(iso, days){
  const d = new Date(iso + "T00:00:00");
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0,10);
}
function fmtDate(iso){ const d = new Date(iso+"T00:00:00"); return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}); }
function fmtDateLong(iso){ const d = new Date(iso+"T00:00:00"); return d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'}); }
function dowShort(iso){ const d = new Date(iso+"T00:00:00"); return d.toLocaleDateString('en-US',{weekday:'short'}).toUpperCase(); }
function dowKey(iso){ return ["sun","mon","tue","wed","thu","fri","sat"][new Date(iso+"T00:00:00").getDay()]; }
function dayNum(iso){ return new Date(iso+"T00:00:00").getDate(); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function daysBetween(a,b){ return Math.round((new Date(b+"T00:00:00") - new Date(a+"T00:00:00")) / 86400000); }
function uid(prefix){ return prefix + "_" + Math.random().toString(36).slice(2,9); }

/* Fixed anchor: week 1 of the original 10-week build always starts 68 days
   before the event, regardless of when the user actually begins training. */
const WEEK1_ANCHOR = dateAdd(EVENT.date, -68);   // 2026-07-13
const PLAN_HARD_END = dateAdd(EVENT.date, 1);    // day after the race

/* time-per-set estimate (seconds), used to auto-compute workout durations */
function secPerSetFor(ex){
  if(!ex) return 40;
  if(ex.bodyGroup==="mobility" || ex.bodyGroup==="recovery") return 45;
  return 35;
}
function estimateStrengthMinutes(exerciseRefs, exLib){
  let totalSec = 0;
  exerciseRefs.forEach(ref=>{
    const ex = exLib[ref.exId];
    const sets = parseInt(ref.sets) || 1;
    totalSec += sets*(secPerSetFor(ex)+20) + 15; // +20s rest/set, +15s transition
  });
  return Math.max(5, Math.round(totalSec/60));
}
function estimateStrengthMinutesFromItems(items, exLib){
  let totalSec = 0;
  items.forEach(it=>{
    const ex = exLib[it.exId];
    const sets = parseInt(it.targetSets) || 1;
    totalSec += sets*(secPerSetFor(ex)+20) + 15;

}

const WEEK_META_BY_N = {}; WEEK_META.forEach(w=>WEEK_META_BY_N[w.n]=w);

function weekIndexForDate(date){
  const idx = Math.floor(daysBetween(WEEK1_ANCHOR, date)/7) + 1;
  return Math.max(0, Math.min(10, idx));
}

/* ---------------- SCHEDULE TEMPLATE GENERATOR ----------------
   Produces the ORIGINAL (unmodified) plan as a sequence of day templates,
   each referencing workout IDs from the library (not embedded objects). */
function buildTemplateSequence(planStart, planEnd){
  const days = [];
  let d = planStart;
  while(d <= planEnd){
    const wm = WEEK_META_BY_N[weekIndexForDate(d)];
    const phase = wm.phase;
    const dow = dowKey(d);
    let title="", type="rest", refs=[];

    if(d === EVENT.date){
      title = "CENTURY DAY 🏆"; type = "race";
      refs = [{workoutId:"cy_race_day"}];
    } else if(d === PLAN_HARD_END){
      title = "Full Rest — Recover"; type = "recovery"; refs = [];
    } else if(dow==="mon"){
      if(phase==="taper" || !wm.runMi){
        title = "Rest Day"; type = "rest"; refs = [];
      } else {
        title = "Outdoor Run"; type = "run";
        refs = [
          {workoutId:"run_easy", overrides:{timeMin:Math.round(wm.runMi*11), estMiles:wm.runMi}},
          {workoutId:"sb_foam_roll_monday"}
        ];
      }
    } else if(dow==="tue"){
      const cyId = "cy_tue_"+(phase==="prep"?"recovery":phase);
      const sbId = "sb_upper_"+phase;
      title = WORKOUT_SEED[sbId] ? ("Indoor Ride + " + WORKOUT_SEED[sbId].name) : "Indoor Ride";
      type = "indoor";
      refs = [{workoutId:cyId}];
      if(WORKOUT_SEED[sbId] && WORKOUT_SEED[sbId].exercises.length) refs.push({workoutId:sbId});
    } else if(dow==="wed"){
      title = "Outdoor Endurance Ride"; type = "outdoor";
      refs = [{workoutId:"cy_outdoor_endurance", overrides:{timeMin:Math.round(wm.midHrs*60), estMiles:wm.midMi}}];
    } else if(dow==="thu"){
      const cyId = "cy_thu_"+(phase==="prep"?"recovery":phase);
      const sbId = "sb_lower_"+phase;
      const hasStrength = WORKOUT_SEED[sbId] && WORKOUT_SEED[sbId].exercises.length;
      const cyIsRest = phase==="taper";
      if(cyIsRest && !hasStrength){
        title = "Rest Day"; type = "rest"; refs = [];
      } else {
        title = hasStrength ? ("Indoor Ride + " + WORKOUT_SEED[sbId].name) : "Indoor Ride";
        type = "indoor";
        refs = cyIsRest ? [] : [{workoutId:cyId}];
        if(hasStrength) refs.push({workoutId:sbId});
      }
    } else if(dow==="fri"){
      const sbId = "sb_full_"+phase;
      const wk = WORKOUT_SEED[sbId];
      title = wk ? wk.name : "Rest Day";
      type = wk && wk.exercises.length ? "strength" : "rest";
      refs = wk && wk.exercises.length ? [{workoutId:sbId}] : [];
    } else if(dow==="sat"){
      title = "Long Ride"; type = "outdoor";
      const note = weekIndexForDate(d)===9 ? " This is your final big simulation ride before taper — aim to mimic race nutrition exactly." : "";
      refs = [{workoutId:"cy_long_ride", overrides:{timeMin:Math.round((wm.longHrs||1)*60), estMiles:wm.longMi, descSuffix:note}}];
    } else if(dow==="sun"){
      if(wm.sunOutdoor){
        title = "Outdoor Recovery Ride"; type = "outdoor";
        refs = [{workoutId:"cy_outdoor_recovery"}];
      } else {
        title = phase==="taper" ? "Full Rest — Recover" : "Recovery Spin + Mobility";
        type = "recovery";
        refs = phase==="taper" ? [] : [{workoutId:"cy_indoor_recovery"}, {workoutId:"sb_flex_flow"}];
      }
    }

    days.push({date:d, dow, dowLabel:dowShort(d), weekNum:weekIndexForDate(d), phase, phaseLabel:wm.phaseLabel, title, type, refs});
    d = dateAdd(d,1);
  }
  return days;
}

   CENTURY READY — SCHEDULING ENGINE
   Handles: editable libraries, plan-start persistence, the
   dailyQueue (skip/swap), and per-day workout substitutions.

const Lib = {
  exercises: null,   // id -> exercise (merged seed + custom)
  workouts: null,    // id -> workout (merged seed + custom)
};

async function loadLibraries(){
  const exCustom = (await loadJSON("exerciseLibrary")) || {};
  const wkCustom = (await loadJSON("workoutLibrary")) || {};
  Lib.exercises = Object.assign({}, EXERCISE_SEED, exCustom);
  Lib.workouts = Object.assign({}, WORKOUT_SEED, wkCustom);
}
async function saveExercise(id, data){
  const exCustom = (await loadJSON("exerciseLibrary")) || {};
  exCustom[id] = data;
  await saveJSON("exerciseLibrary", exCustom);
  Lib.exercises[id] = data;
}
async function deleteExercise(id){
  const exCustom = (await loadJSON("exerciseLibrary")) || {};
  delete exCustom[id];
  await saveJSON("exerciseLibrary", exCustom);
  delete Lib.exercises[id];
  if(EXERCISE_SEED[id]) Lib.exercises[id] = EXERCISE_SEED[id]; // restore seed if built-in
}
async function saveWorkout(id, data){
  const wkCustom = (await loadJSON("workoutLibrary")) || {};
  wkCustom[id] = data;
  await saveJSON("workoutLibrary", wkCustom);
  Lib.workouts[id] = data;
}
async function deleteWorkout(id){
  const wkCustom = (await loadJSON("workoutLibrary")) || {};
  delete wkCustom[id];
  await saveJSON("workoutLibrary", wkCustom);
  delete Lib.workouts[id];
  if(WORKOUT_SEED[id]) Lib.workouts[id] = WORKOUT_SEED[id];
}

/* Resolve a workout-library entry (+ optional instance overrides) into the
   full renderable object, recomputing strength-block duration live. */
function resolveWorkout(workoutId, overrides){
  const base = Lib.workouts[workoutId];
  if(!base) return null;
  const w = Object.assign({id:workoutId}, base, overrides||{});
  if(overrides && overrides.descSuffix){ w.desc = (base.desc||"") + overrides.descSuffix; }

  if(w.kind==="cycling"){
    return {
      kind:"cycling", id:workoutId, name:w.name, desc:w.desc, timeMin:w.timeMin, zoneText:w.zoneText,
      platform:w.platform, estMiles:w.estMiles, isLongRide:!!w.isLongRide, isRace:!!w.isRace, source:w.source, url:w.url, targetTSS:w.targetTSS
    };
  }
  if(w.kind==="run"){
    return {
      kind:"run", id:workoutId, name:w.name, desc:w.desc, timeMin:w.timeMin, paceText:w.paceText,
      platform:w.platform||"Outdoor", estMiles:w.estMiles
    };
  }
  if(w.kind==="strengthblock"){
    const items = (w.exercises||[]).map(ref=>{
      const ex = Lib.exercises[ref.exId] || {name:"(missing exercise)", desc:"", bodyGroup:"", bodyParts:[]};
      return {exId:ref.exId, name:ex.name, desc:ex.desc, bodyGroup:ex.bodyGroup, bodyParts:ex.bodyParts, targetSets:ref.sets, targetReps:ref.reps};
    });
    const timeMin = estimateStrengthMinutes(w.exercises||[], Lib.exercises);
    return {kind:"strengthblock", id:workoutId, title:w.name, desc:w.desc, bodyGroup:w.bodyGroup, timeMin, items};
  }
  return null;
}

/* ---------------- CALENDAR / DAILY QUEUE ---------------- */
const Plan = {
  start: null,          // ISO date, persisted
  end: null,            // ISO date, fixed = PLAN_HARD_END
  templates: [],         // original sequence (array of {date,...,refs})
  templateByDate: {},
  dailyQueue: [],        // persisted: array (same length as templates) of template-index or null(=skipped/rest)
  dayOverrides: {}       // persisted: date -> {slots:{0:{workoutId,overrides}, 1:{...}}}
};

async function setPlanStart(newDate){
  await saveJSON("planStart", newDate);
  Plan.start = newDate;
  Plan.templates = buildTemplateSequence(Plan.start, Plan.end);
  Plan.templateByDate = {};
  Plan.templates.forEach((t,i)=>{ Plan.templateByDate[t.date] = i; });
  Plan.dailyQueue = Plan.templates.map((_,i)=>i);
  await saveJSON("dailyQueue", Plan.dailyQueue);
  Plan.dayOverrides = {};
  await saveJSON("dayOverrides", Plan.dayOverrides);
  const dates = allCalendarDates();
  State.selectedDate = dates.includes(todayISO()) ? todayISO() : dates[0];
  State.calendarSelectedDate = State.selectedDate;
  const dp = getDayPlan(State.selectedDate);
  State.openWeek = dp ? dp.weekNum : 1;
  render();
}

async function initPlan(){
  let start = await loadJSON("planStart");
  if(!start){
    start = todayISO();
    if(start > PLAN_HARD_END) start = PLAN_HARD_END; // safety: event already passed
    await saveJSON("planStart", start);
  }
  Plan.start = start;
  Plan.end = PLAN_HARD_END;
  Plan.templates = buildTemplateSequence(Plan.start, Plan.end);
  Plan.templateByDate = {};
  Plan.templates.forEach((t,i)=>{ Plan.templateByDate[t.date] = i; });

  const savedQueue = await loadJSON("dailyQueue");
  if(savedQueue && savedQueue.length === Plan.templates.length){
    Plan.dailyQueue = savedQueue;
  } else {
    Plan.dailyQueue = Plan.templates.map((_,i)=>i); // identity
    await saveJSON("dailyQueue", Plan.dailyQueue);
  }
  Plan.dayOverrides = (await loadJSON("dayOverrides")) || {};
}

function dateIndex(date){ return Plan.templateByDate[date]; }

/* Resolve the full plan for a given calendar date: template content (possibly
   shifted by skip/swap) + substitutions + user-added workouts + display order. */
function getDayPlan(date){
  const idx = dateIndex(date);
  if(idx===undefined) return null;
  const tIdx = Plan.dailyQueue[idx];
  const template = tIdx===null || tIdx===undefined ? null : Plan.templates[tIdx];

  let title, type, refs, phase, phaseLabel, weekNum, isSkipped=false;
  if(template===null){
    title = "Rest Day (Skipped)"; type = "rest"; refs = []; isSkipped = true;
    const own = Plan.templates[idx];
    phase = own.phase; phaseLabel = own.phaseLabel; weekNum = own.weekNum;
  } else {
    title = template.title; type = template.type; refs = template.refs.slice();
    phase = template.phase; phaseLabel = template.phaseLabel; weekNum = template.weekNum;
  }

  const ov = Plan.dayOverrides[date] || {};
  const removedSet = new Set(ov.removed||[]);
  const slotDefs = refs.map((r,i)=>({slotKey:"t"+i, workoutId:r.workoutId, overrides:r.overrides}))
    .filter(sd=>!removedSet.has(sd.slotKey));
  (ov.added||[]).forEach((a,i)=>{
    const sk = a.slotKey||("a"+i);
    if(!removedSet.has(sk)) slotDefs.push({slotKey:sk, workoutId:a.workoutId, overrides:a.overrides});
  });

  let resolved = slotDefs.map(sd=>{
    let wid = sd.workoutId, wov = sd.overrides;
    if(ov.slots && ov.slots[sd.slotKey]){ wid = ov.slots[sd.slotKey].workoutId; wov = ov.slots[sd.slotKey].overrides; }
    const w = resolveWorkout(wid, wov);
    if(!w) return null;
    w.slotKey = sd.slotKey;

    if(w.kind==="strengthblock"){
      const exAdd = (ov.exAdd && ov.exAdd[sd.slotKey]) || [];
      let canonical = w.items.slice();
      exAdd.forEach(ref=>{
        const ex = Lib.exercises[ref.exId] || {name:"(missing exercise)", desc:"", bodyGroup:"", bodyParts:[]};
        canonical.push({exId:ref.exId, name:ex.name, desc:ex.desc, bodyGroup:ex.bodyGroup, bodyParts:ex.bodyParts, targetSets:ref.sets, targetReps:ref.reps});
      });
      canonical = canonical.map((it,i)=>({...it, origIndex:i}));
      const exRemove = (ov.exRemove && ov.exRemove[sd.slotKey]) || [];
      let items = canonical.filter(it=>!exRemove.includes(it.origIndex));
      if(ov.exOrder && ov.exOrder[sd.slotKey]){
        const orderArr = ov.exOrder[sd.slotKey];
        const byIdx = {}; items.forEach(it=>byIdx[it.origIndex]=it);
        const reordered = orderArr.map(oi=>byIdx[oi]).filter(Boolean);
        items.forEach(it=>{ if(!orderArr.includes(it.origIndex)) reordered.push(it); });
        items = reordered;
      }
      w.items = items;
      w.timeMin = estimateStrengthMinutesFromItems(items, Lib.exercises);
    }
    return w;
  }).filter(Boolean);

  if(ov.order && ov.order.length){
    const byKey = {}; resolved.forEach(w=>byKey[w.slotKey]=w);
    const ordered = ov.order.map(k=>byKey[k]).filter(Boolean);
    resolved.forEach(w=>{ if(!ov.order.includes(w.slotKey)) ordered.push(w); });
    resolved = ordered;
  }

  const derivedType = deriveDayType(resolved, type);

  return {
    date, dow: dowKey(date), dowLabel: dowShort(date), weekNum, phase, phaseLabel,
    title, type: derivedType, workouts: resolved, isSkipped,
    isSubstituted: !!(ov.slots && Object.keys(ov.slots).length) || !!(ov.added && ov.added.length) || !!(ov.order && ov.order.length) || !!(ov.removed && ov.removed.length) || !!(ov.exAdd && Object.keys(ov.exAdd).length) || !!(ov.exRemove && Object.keys(ov.exRemove).length),
    originalTemplateDate: template ? template.date : null
  };
}

/* Classify a resolved workout into a broad category for day-level labeling */
function classifyWorkout(w){
  if(w.isRace) return "race";
  if(w.kind==="run") return "run";
  if(w.kind==="cycling"){
    if(w.platform==="Outdoor") return "outdoor";
    const txt = ((w.name||"")+" "+(w.zoneText||"")).toLowerCase();
    if(txt.includes("recovery") || txt.includes("zone 1")) return "recovery";
    return "indoor";
  }
  if(w.kind==="strengthblock"){
    if(w.bodyGroup==="recovery" || w.bodyGroup==="mobility") return "recovery";
    return "strength";
  }
  return "strength";
}
/* Pick the day's overall category by whichever classification has the most scheduled minutes */
function deriveDayType(resolvedWorkouts, fallbackType){
  if(!resolvedWorkouts.length) return fallbackType==="race" ? "race" : (fallbackType==="rest" ? "rest" : "rest");
  if(resolvedWorkouts.some(w=>w.isRace)) return "race";
  const totals = {};
  resolvedWorkouts.forEach(w=>{
    const cat = classifyWorkout(w);
    totals[cat] = (totals[cat]||0) + (w.timeMin||0);
  });
  let best = null, bestTime = -1;
  Object.entries(totals).forEach(([cat,t])=>{ if(t>bestTime){ best=cat; bestTime=t; } });
  return best || fallbackType;
}

function allCalendarDates(){ return Plan.templates.map(t=>t.date); }

function addWorkoutToDay(date, workoutId){
  if(!Plan.dayOverrides[date]) Plan.dayOverrides[date] = {};
  const ov = Plan.dayOverrides[date];
  ov.added = ov.added || [];
  const slotKey = "a"+ov.added.length+"_"+Math.random().toString(36).slice(2,6);
  ov.added.push({slotKey, workoutId});
  saveJSON("dayOverrides", Plan.dayOverrides);
  return slotKey;
}
function removeAddedWorkout(date, slotKey){
  const ov = Plan.dayOverrides[date];
  if(!ov || !ov.added) return;
  ov.added = ov.added.filter(a=>a.slotKey!==slotKey);
  if(ov.order) ov.order = ov.order.filter(k=>k!==slotKey);
  saveJSON("dayOverrides", Plan.dayOverrides);
}
/* Remove any workout (template-scheduled or user-added) from a single day's schedule. Non-permanent. */
function removeWorkoutFromDay(date, slotKey){
  if(!Plan.dayOverrides[date]) Plan.dayOverrides[date] = {};
  const ov = Plan.dayOverrides[date];
  ov.removed = ov.removed || [];
  if(!ov.removed.includes(slotKey)) ov.removed.push(slotKey);
  if(ov.order) ov.order = ov.order.filter(k=>k!==slotKey);
  saveJSON("dayOverrides", Plan.dayOverrides);
}
/* Add an exercise from the library into one scheduled strength workout, for this day only. */
function addExerciseToDayWorkout(date, slotKey, exId){
  if(!Plan.dayOverrides[date]) Plan.dayOverrides[date] = {};
  const ov = Plan.dayOverrides[date];
  ov.exAdd = ov.exAdd || {};
  ov.exAdd[slotKey] = ov.exAdd[slotKey] || [];
  const ex = Lib.exercises[exId];
  ov.exAdd[slotKey].push({exId, sets: ex?.sets||"2", reps: ex?.reps||"10"});
  saveJSON("dayOverrides", Plan.dayOverrides);
}
/* Remove one exercise from one scheduled strength workout, for this day only. origIndex refers to
   that exercise's position in the workout as currently resolved for this date. */
function removeExerciseFromDayWorkout(date, slotKey, origIndex){
  if(!Plan.dayOverrides[date]) Plan.dayOverrides[date] = {};
  const ov = Plan.dayOverrides[date];
  ov.exRemove = ov.exRemove || {};
  ov.exRemove[slotKey] = ov.exRemove[slotKey] || [];
  if(!ov.exRemove[slotKey].includes(origIndex)) ov.exRemove[slotKey].push(origIndex);
  if(ov.exOrder && ov.exOrder[slotKey]) ov.exOrder[slotKey] = ov.exOrder[slotKey].filter(i=>i!==origIndex);
  saveJSON("dayOverrides", Plan.dayOverrides);
}
/* Non-permanent: reorder the workouts shown for a given day */
function reorderDayWorkouts(date, slotKey, direction){
  const day = getDayPlan(date);
  const keys = day.workouts.map(w=>w.slotKey);
  const i = keys.indexOf(slotKey);
  const j = i + direction;
  if(i<0 || j<0 || j>=keys.length) return;
  [keys[i], keys[j]] = [keys[j], keys[i]];
  if(!Plan.dayOverrides[date]) Plan.dayOverrides[date] = {};
  Plan.dayOverrides[date].order = keys;
  saveJSON("dayOverrides", Plan.dayOverrides);
}
/* Non-permanent: reorder exercises within one scheduled strength workout */
function reorderExercisesInSlot(date, slotKey, exOrigIndex, direction){
  const day = getDayPlan(date);
  const w = day.workouts.find(x=>x.slotKey===slotKey);
  if(!w || w.kind!=="strengthblock") return;
  const order = w.items.map(it=>it.origIndex);
  const i = order.indexOf(exOrigIndex);
  const j = i + direction;
  if(i<0 || j<0 || j>=order.length) return;
  [order[i], order[j]] = [order[j], order[i]];
  if(!Plan.dayOverrides[date]) Plan.dayOverrides[date] = {};
  Plan.dayOverrides[date].exOrder = Plan.dayOverrides[date].exOrder || {};
  Plan.dayOverrides[date].exOrder[slotKey] = order;
  saveJSON("dayOverrides", Plan.dayOverrides);
}

/* ---------------- SKIP DAYS ----------------
   Pushes the content that WAS scheduled for [fromDate .. fromDate+count-1]
   later, compressing the lowest-priority days between here and race day
   so the race date itself never moves. */
function removalPriority(tIdx){
  if(tIdx===null || tIdx===undefined) return -1; // already-blank slots go first
  const t = Plan.templates[tIdx];
  if(t.type==="race") return 999;
  const hasLong = t.refs.some(r=>r.workoutId==="cy_long_ride" || r.workoutId==="cy_race_day");
  if(hasLong) return 50;
  if(t.type==="rest") return 0;
  if(t.type==="recovery") return 1;
  if(t.type==="strength") return 2;
  if(t.type==="indoor") return 3;
  if(t.type==="outdoor") return 4;
  return 5;
}

function skipDays(fromDate, count){
  const raceIdx = dateIndex(EVENT.date);
  const idx = dateIndex(fromDate);
  if(idx===undefined || raceIdx===undefined) return {ok:false, msg:"Date out of range."};
  if(idx >= raceIdx) return {ok:false, msg:"You can't skip on or after race day."};
  count = Math.min(count, raceIdx - idx);
  if(count<=0) return {ok:false, msg:"Nothing to skip."};

  const windowSlice = Plan.dailyQueue.slice(idx, raceIdx);
  let combined = new Array(count).fill(null).concat(windowSlice);

  // need to drop `count` entries to get back to windowSlice.length; prefer lowest-priority,
  // never touch the first `count` (those are the intentional skip markers)
  const removable = combined.map((val,i)=>({val,i})).slice(count);
  removable.sort((a,b)=> removalPriority(a.val) - removalPriority(b.val));
  const toRemove = new Set(removable.slice(0, count).map(r=>r.i));
  combined = combined.filter((val,i)=> !toRemove.has(i));

  for(let i=0;i<windowSlice.length;i++){
    Plan.dailyQueue[idx+i] = combined[i];
  }
  saveJSON("dailyQueue", Plan.dailyQueue);
  return {ok:true, msg:`Skipped ${count} day${count>1?'s':''}. Your remaining sessions shifted later; a few of the lowest-priority days were compressed out so race day stays on ${fmtDate(EVENT.date)}.`};
}

function swapDays(dateA, dateB){
  const a = dateIndex(dateA), b = dateIndex(dateB);
  if(a===undefined || b===undefined) return {ok:false, msg:"Date out of range."};
  if(dateA===EVENT.date || dateB===EVENT.date) return {ok:false, msg:"Race day can't be swapped."};
  const tmp = Plan.dailyQueue[a];
  Plan.dailyQueue[a] = Plan.dailyQueue[b];
  Plan.dailyQueue[b] = tmp;
  saveJSON("dailyQueue", Plan.dailyQueue);
  return {ok:true, msg:`Swapped ${fmtDate(dateA)} and ${fmtDate(dateB)}.`};
}

function resetDay(date){
  const idx = dateIndex(date);
  if(idx===undefined) return;
  Plan.dailyQueue[idx] = idx;
  saveJSON("dailyQueue", Plan.dailyQueue);
  if(Plan.dayOverrides[date]){ delete Plan.dayOverrides[date]; saveJSON("dayOverrides", Plan.dayOverrides); }
}

/* ---------------- SUBSTITUTE A SINGLE WORKOUT SLOT ---------------- */
function substituteWorkout(date, slotIndex, newWorkoutId){
  if(!Plan.dayOverrides[date]) Plan.dayOverrides[date] = {slots:{}};
  if(!Plan.dayOverrides[date].slots) Plan.dayOverrides[date].slots = {};
  Plan.dayOverrides[date].slots[slotIndex] = {workoutId:newWorkoutId};
  saveJSON("dayOverrides", Plan.dayOverrides);
}
function revertSlot(date, slotIndex){
  if(Plan.dayOverrides[date] && Plan.dayOverrides[date].slots){
    delete Plan.dayOverrides[date].slots[slotIndex];
    saveJSON("dayOverrides", Plan.dayOverrides);
  }
}

/* per-day temporary (non-permanent) target overrides for an exercise's sets/reps,
   stored inside the day's log so they don't touch the library */
async function setTempExerciseTarget(date, slotIndex, exIndex, sets, reps){
  const log = await getLog(date);
  log.targetOverrides = log.targetOverrides || {};
  const key = slotIndex+"_"+exIndex;
  log.targetOverrides[key] = {sets, reps};
  await saveLog(date, log);
}
/* ============================================================
   CENTURY READY — WEATHER
   Uses the Anthropic API (with web search) from inside the artifact
   to resolve a zip/city to current conditions + today's forecast.
   ============================================================ */

const Weather = {
  location: null,
  data: null,
  fetchedAt: null,
  loading: false,
  error: null,
  timer: null
};

const WEATHER_REFRESH_MS = 30*60*1000; // 30 minutes minimum, per spec

async function initWeather(){
  Weather.location = await loadJSON("weatherLocation");
  const cached = await loadJSON("weatherCache");
  if(cached){ Weather.data = cached.data; Weather.fetchedAt = cached.fetchedAt; }
  if(Weather.location){
    const age = cached ? (Date.now() - new Date(cached.fetchedAt).getTime()) : Infinity;
    if(age > WEATHER_REFRESH_MS || !cached) refreshWeather();
  }
  if(Weather.timer) clearInterval(Weather.timer);
  Weather.timer = setInterval(()=>{ if(Weather.location) refreshWeather(); }, WEATHER_REFRESH_MS);
}

async function setWeatherLocation(label){
  Weather.location = {label};
  await saveJSON("weatherLocation", Weather.location);
  await refreshWeather();
}

async function refreshWeather(){
  if(!Weather.location || Weather.loading) return;
  Weather.loading = true; Weather.error = null;
  if(document.getElementById("weather-widget")) renderWeatherWidget();

  let data = null, lastError = null;

  // Path 1: inside Claude.ai, use the Anthropic API (web search) for a natural forecast.
  if(!window._usingLocalStoragePolyfill){
    try{ data = await fetchWeatherViaClaude(Weather.location.label); }
    catch(e){ lastError = e; console.warn("Claude weather path failed, will try direct source:", e); }
  }

  // Path 2: standalone (or Path 1 failed) — hit a free, CORS-enabled weather API directly
  // from the browser. This is what makes live weather work outside Claude.ai.
  if(!data){
    try{ data = await fetchWeatherViaOpenMeteo(Weather.location.label); }
    catch(e){ lastError = e; console.error("Open-Meteo weather path failed:", e); }
  }

  if(data){
    Weather.data = data;
    Weather.fetchedAt = new Date().toISOString();
    await saveJSON("weatherCache", {data, fetchedAt: Weather.fetchedAt});
  } else {
    console.error("weather fetch failed", lastError);
    Weather.error = "Couldn't fetch weather right now. Check the location spelling and your internet connection, then try again.";
  }

  Weather.loading = false;
  if(document.getElementById("weather-widget")) renderWeatherWidget();
  if(typeof checkOutdoorWeatherAlert==="function") checkOutdoorWeatherAlert();
}

async function fetchWeatherViaClaude(label){
  const now = new Date();
  const prompt = `Search the web for the CURRENT weather conditions and TODAY's forecast for this location: "${label}". `+
    `Today's date is ${now.toISOString().slice(0,10)}. Respond with ONLY a single JSON object, no markdown fences, no commentary, matching exactly this shape:\n`+
    `{"resolvedLocation":"City, ST","tempF":number,"feelsLikeF":number,"condition":"short label like Partly Cloudy","icon":"one of: sunny|partly-cloudy|cloudy|rain|thunderstorm|snow|fog|windy","forecastText":"one sentence forecast summary for today","highF":number,"lowF":number,"sunsetLocal":"h:mm AM/PM","severeAlert":boolean,"severeText":"short reason if severeAlert true, else empty string","precipChancePct":number,"windMph":number}`;

  const resp = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      model:"claude-sonnet-4-6",
      max_tokens:1000,
      messages:[{role:"user", content:prompt}],
      tools:[{type:"web_search_20250305", name:"web_search"}]
    })
  });
  const json = await resp.json();
  const textBlocks = (json.content||[]).filter(b=>b.type==="text").map(b=>b.text);
  let raw = textBlocks.join("\n").trim();
  raw = raw.replace(/^```json/i,"").replace(/^```/,"").replace(/```$/,"").trim();
  const firstBrace = raw.indexOf("{"), lastBrace = raw.lastIndexOf("}");
  if(firstBrace===-1 || lastBrace===-1) throw new Error("No JSON in Claude response");
  return JSON.parse(raw.slice(firstBrace, lastBrace+1));
}

/* ---- Free/no-key/CORS-open weather source, for standalone browser use ----
   Zippopotam.us resolves US zip codes; Open-Meteo's geocoder resolves city/state
   names; Open-Meteo's forecast API needs no API key and allows cross-origin
   requests from any page, including a file:// page opened directly in Chrome. */
const WMO_ICON_MAP = {
  0:{icon:"sunny",condition:"Clear"}, 1:{icon:"sunny",condition:"Mainly Clear"},
  2:{icon:"partly-cloudy",condition:"Partly Cloudy"}, 3:{icon:"cloudy",condition:"Overcast"},
  45:{icon:"fog",condition:"Fog"}, 48:{icon:"fog",condition:"Freezing Fog"},
  51:{icon:"rain",condition:"Light Drizzle"}, 53:{icon:"rain",condition:"Drizzle"}, 55:{icon:"rain",condition:"Dense Drizzle"},
  56:{icon:"rain",condition:"Freezing Drizzle"}, 57:{icon:"rain",condition:"Freezing Drizzle"},
  61:{icon:"rain",condition:"Light Rain"}, 63:{icon:"rain",condition:"Rain"}, 65:{icon:"rain",condition:"Heavy Rain"},
  66:{icon:"rain",condition:"Freezing Rain"}, 67:{icon:"rain",condition:"Freezing Rain"},
  71:{icon:"snow",condition:"Light Snow"}, 73:{icon:"snow",condition:"Snow"}, 75:{icon:"snow",condition:"Heavy Snow"}, 77:{icon:"snow",condition:"Snow Grains"},
  80:{icon:"rain",condition:"Rain Showers"}, 81:{icon:"rain",condition:"Rain Showers"}, 82:{icon:"rain",condition:"Violent Rain Showers"},
  85:{icon:"snow",condition:"Snow Showers"}, 86:{icon:"snow",condition:"Snow Showers"},
  95:{icon:"thunderstorm",condition:"Thunderstorm",severe:true}, 96:{icon:"thunderstorm",condition:"Thunderstorm with Hail",severe:true}, 99:{icon:"thunderstorm",condition:"Severe Thunderstorm",severe:true}
};
function fmtTimeFromISO(iso){
  if(!iso) return "";
  const d = new Date(iso);
  return d.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});
}
async function geocodeLocation(label){
  const trimmed = label.trim();
  if(/^\d{5}$/.test(trimmed)){
    const resp = await fetch(`https://api.zippopotam.us/us/${trimmed}`);
    if(!resp.ok) throw new Error("ZIP not found");
    const j = await resp.json();
    const place = j.places && j.places[0];
    if(!place) throw new Error("ZIP not found");
    return {lat:parseFloat(place.latitude), lon:parseFloat(place.longitude), label:`${place["place name"]}, ${place["state abbreviation"]}`};
  }
  const resp = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(trimmed)}&count=1&language=en&format=json`);
  if(!resp.ok) throw new Error("Geocoding request failed");
  const j = await resp.json();
  const r = j.results && j.results[0];
  if(!r) throw new Error("Location not found");
  return {lat:r.latitude, lon:r.longitude, label:r.admin1 ? `${r.name}, ${r.admin1}` : r.name};
}
async function fetchWeatherViaOpenMeteo(label){
  const loc = await geocodeLocation(label);
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}`+
    `&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m`+
    `&daily=sunset,temperature_2m_max,temperature_2m_min,precipitation_probability_max,weather_code`+
    `&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=auto&forecast_days=1`;
  const resp = await fetch(url);
  if(!resp.ok) throw new Error("Forecast request failed");
  const j = await resp.json();
  const wmo = WMO_ICON_MAP[j.daily.weather_code[0]] || WMO_ICON_MAP[j.current.weather_code] || {icon:"partly-cloudy",condition:"Mixed"};
  const highF = Math.round(j.daily.temperature_2m_max[0]), lowF = Math.round(j.daily.temperature_2m_min[0]);
  const precip = Math.round(j.daily.precipitation_probability_max[0]||0);
  return {
    resolvedLocation: loc.label,
    tempF: Math.round(j.current.temperature_2m),
    feelsLikeF: Math.round(j.current.apparent_temperature),
    condition: wmo.condition,
    icon: wmo.icon,
    forecastText: `${wmo.condition}, high ${highF}°F / low ${lowF}°F, ${precip}% chance of precipitation.`,
    highF, lowF,
    sunsetLocal: fmtTimeFromISO(j.daily.sunset[0]),
    severeAlert: !!wmo.severe,
    severeText: wmo.severe ? wmo.condition+" in the forecast" : "",
    precipChancePct: precip,
    windMph: Math.round(j.current.wind_speed_10m)
  };
}

function isUnsuitableWeather(data){
  if(!data) return null;
  if(data.severeAlert) return data.severeText || "Severe weather in the forecast.";
  if(["rain","thunderstorm"].includes(data.icon)) return "Rain or thunderstorms in the forecast.";
  if(data.tempF!=null && data.tempF>=95) return `Forecast high near ${data.tempF}°F — heat risk for a long outdoor ride.`;
  return null;
}
function minutesUntilSunset(sunsetLocal){
  if(!sunsetLocal) return null;
  const m = sunsetLocal.match(/(\d{1,2}):(\d{2})\s*(AM|PM)/i);
  if(!m) return null;
  let h = parseInt(m[1])%12; if(/pm/i.test(m[3])) h+=12;
  const mins = parseInt(m[2]);
  const now = new Date();
  const sunset = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, mins, 0);
  return Math.round((sunset - now)/60000);
}

function checkTodayOutdoorSuitability(dayPlan, log){
  if(!dayPlan) return null;
  const outdoorWorkouts = dayPlan.workouts.filter(w=>(w.kind==="cycling" || w.kind==="run") && w.platform==="Outdoor");
  if(!outdoorWorkouts.length) return null;
  const alreadyLogged = outdoorWorkouts.some(w=> log.workouts && log.workouts[w.slotKey] && durationLogged(log.workouts[w.slotKey]));
  if(alreadyLogged) return null;
  if(dayPlan.date !== todayISO()) return null;

  const reasons = [];
  if(Weather.data){
    const wx = isUnsuitableWeather(Weather.data);
    if(wx) reasons.push(wx);
    const totalMin = outdoorWorkouts.reduce((s,w)=>s+(w.timeMin||0),0);
    const untilSunset = minutesUntilSunset(Weather.data.sunsetLocal);
    if(untilSunset!=null && untilSunset < totalMin && untilSunset > -600){
      reasons.push(`Only about ${Math.max(untilSunset,0)} min of daylight left — not enough time to finish before sunset (${Weather.data.sunsetLocal}).`);
    }
  }
  if(!reasons.length) return null;
  return {reasons, outdoorWorkouts};
}

}
/* ============================================================
   CENTURY READY — GOOGLE DRIVE CLOUD SYNC
   Lets the exact same app.html, hosted at a real URL (e.g. GitHub
   Pages), sync its data through a single JSON file in the user's
   own Google Drive — so phone and desktop stay in sync without
   depending on Claude.ai's artifact storage or per-browser localStorage.
   Uses the drive.file scope: the app can only ever see files it
   creates itself, never the rest of the user's Drive.
   ============================================================ */

const DRIVE_FILE_NAME = "century-ready-data.json";
const DRIVE_SCOPE = "https://www.googleapis.com/auth/drive.file";
const DRIVE_PUSH_DEBOUNCE_MS = 4000;
const DRIVE_PUSH_MAX_WAIT_MS = 8000;   // push at least this often even during a burst of edits
const DRIVE_POLL_MS = 45000;            // check Drive for changes made on another device

const Drive = {
  clientId: null,
  connected: false,
  userEmail: null,
  fileId: null,
  accessToken: null,
  tokenExpiresAt: 0,
  tokenClient: null,
  gisLoaded: false,
  syncing: false,
  lastSyncAt: null,
  lastError: null,
  pushTimer: null,
  pollTimer: null,
  dirtySince: null,
  dirtySincePush: false
};

async function initDriveSync(){
  const cfg = await loadJSON("driveConfig");
  if(cfg){ Drive.clientId = cfg.clientId; Drive.fileId = cfg.fileId || null; }
  if(!Drive._listenerAttached){
    document.addEventListener("visibilitychange", ()=>{
      if(document.visibilityState==="hidden" && Drive.connected && Drive.dirtySincePush) pushToDrive();
      if(document.visibilityState==="visible" && Drive.connected) pollTick();
    });
    window.addEventListener("pagehide", ()=>{
      if(Drive.connected && Drive.dirtySincePush) pushToDrive();
    });
    Drive._listenerAttached = true;
  }
  if(Drive.clientId && Drive.fileId){
    // returning user: try a silent (no-popup) reconnect so both devices
    // stay live without requiring a manual "Connect" click every time.
    await attemptSilentReconnect();
  }
}

async function attemptSilentReconnect(){
  try{
    await loadGISScript();
    const gotToken = await new Promise((resolve)=>{
      Drive.tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: Drive.clientId,
        scope: DRIVE_SCOPE,
        callback: (resp)=>{
          if(resp.error){ resolve(false); return; }
          Drive.accessToken = resp.access_token;
          Drive.tokenExpiresAt = Date.now() + (resp.expires_in||3600)*1000 - 60000;
          resolve(true);
        }
      });
      Drive.tokenClient.requestAccessToken({prompt: ""}); // silent — no popup, may fail quietly
    });
    if(gotToken){
      Drive.connected = true;
      await fetchDriveUserInfo();
      await pullFromDrive();
      Drive.lastSyncAt = new Date().toISOString();
      startDrivePolling();
    }
  } catch(e){
    // silent reconnect failing is expected/normal (e.g. no active Google session) — just
    // leave Drive.connected false so the UI shows a "Connect" button.
  }
}

function startDrivePolling(){
  if(Drive.pollTimer) clearInterval(Drive.pollTimer);
  Drive.pollTimer = setInterval(pollTick, DRIVE_POLL_MS);
}
async function pollTick(){
  if(!Drive.connected || document.visibilityState==="hidden") return;
  if(Drive.dirtySincePush) await pushToDrive();
  else await pullFromDrive();
}

function loadGISScript(){
  return new Promise((resolve, reject)=>{
    if(window.google && window.google.accounts && window.google.accounts.oauth2){ Drive.gisLoaded = true; return resolve(); }
    const s = document.createElement("script");
    s.src = "https://accounts.google.com/gsi/client";
    s.async = true;
    s.onload = ()=>{ Drive.gisLoaded = true; resolve(); };
    s.onerror = ()=> reject(new Error("Couldn't load Google's sign-in script — check your internet connection."));
    document.head.appendChild(s);
  });
}

async function saveDriveClientId(clientId){
  Drive.clientId = clientId.trim();
  await saveJSONRaw("driveConfig", {clientId: Drive.clientId, fileId: Drive.fileId});
}
/* raw save that bypasses the auto-push hook (avoids syncing before we're connected) */
async function saveJSONRaw(key, obj){
  try{ await window.storage.set(key, JSON.stringify(obj), false); return true; }
  catch(e){ console.error("save failed", key, e); return false; }
}

async function hasSubstantialLocalData(){
  const logKeys = await listKeys("log:");
  if(logKeys.length > 0) return true;
  const wl = await loadJSON("workoutLibrary");
  if(wl && Object.keys(wl).length) return true;
  const el = await loadJSON("exerciseLibrary");
  if(el && Object.keys(el).length) return true;
  return false;
}

async function connectDrive(){
  if(!Drive.clientId){ Drive.lastError = "Enter a Client ID first."; return; }
  Drive.lastError = null;
  try{
    await loadGISScript();
    await new Promise((resolve, reject)=>{
      Drive.tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: Drive.clientId,
        scope: DRIVE_SCOPE,
        callback: async (resp)=>{
          if(resp.error){ reject(new Error(resp.error)); return; }
          Drive.accessToken = resp.access_token;
          Drive.tokenExpiresAt = Date.now() + (resp.expires_in||3600)*1000 - 60000;
          resolve();
        }
      });
      Drive.tokenClient.requestAccessToken({prompt: "consent"});
    });
    Drive.connected = true;
    await findOrCreateDriveFile();
    await fetchDriveUserInfo();

    // SAFETY: on this device's first-ever sync, never blindly pull — that could
    // silently overwrite real local data with an emptier/older cloud snapshot.
    // Push local data first if there's anything substantial here, so the two
    // copies get merged by timestamp comparison from then on rather than one
    // silently clobbering the other.
    const localMeta = await loadJSON("driveSyncMeta");
    if(!localMeta){
      const hasData = await hasSubstantialLocalData();
      if(hasData){ await pushToDrive(); }
      else { await pullFromDrive(); }
    } else {
      await pullFromDrive();
    }

    Drive.lastSyncAt = new Date().toISOString();
    startDrivePolling();
  } catch(e){
    console.error("Drive connect failed", e);
    Drive.connected = false;
    Drive.lastError = "Couldn't connect to Google Drive. " + (e.message||"");
  }
  if(typeof renderTabContent==="function") renderTabContent();
}

async function ensureFreshToken(){
  if(Drive.accessToken && Date.now() < Drive.tokenExpiresAt) return true;
  if(!Drive.tokenClient) return false;
  return new Promise((resolve)=>{
    Drive.tokenClient.callback = (resp)=>{
      if(resp.error){ resolve(false); return; }
      Drive.accessToken = resp.access_token;
      Drive.tokenExpiresAt = Date.now() + (resp.expires_in||3600)*1000 - 60000;
      resolve(true);
    };
    Drive.tokenClient.requestAccessToken({prompt: ""}); // silent refresh if session still active
  });
}

async function fetchDriveUserInfo(){
  try{
    const resp = await fetch("https://www.googleapis.com/oauth2/v3/userinfo", {headers:{Authorization:"Bearer "+Drive.accessToken}});
    if(resp.ok){ const j = await resp.json(); Drive.userEmail = j.email; }
  } catch(e){ /* non-fatal */ }
}

async function findOrCreateDriveFile(){
  const listResp = await fetch(
    `https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(`name='${DRIVE_FILE_NAME}' and trashed=false`)}&fields=files(id,name,modifiedTime)`,
    {headers:{Authorization:"Bearer "+Drive.accessToken}}
  );
  const listJson = await listResp.json();
  if(listJson.files && listJson.files.length){
    Drive.fileId = listJson.files[0].id;
  } else {
    const boundary = "centuryready" + Math.random().toString(36).slice(2);
    const metadata = {name: DRIVE_FILE_NAME, mimeType: "application/json"};
    const body =
      `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n`+
      `--${boundary}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify({updatedAt:new Date().toISOString(), data:{}})}\r\n`+
      `--${boundary}--`;
    const createResp = await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id", {
      method:"POST",
      headers:{Authorization:"Bearer "+Drive.accessToken, "Content-Type":`multipart/related; boundary=${boundary}`},
      body
    });
    const createJson = await createResp.json();
    Drive.fileId = createJson.id;
  }
  await saveJSONRaw("driveConfig", {clientId: Drive.clientId, fileId: Drive.fileId});
}

/* ---------------- EXPORT / IMPORT local data as one bundle ---------------- */
async function exportAllData(){
  const keys = await listKeys("");
  const bundle = {};
  for(const k of keys){
    if(k==="driveConfig") continue;
    bundle[k] = await loadJSON(k);
  }
  return {updatedAt: new Date().toISOString(), data: bundle};
}
async function importAllData(payload){
  if(!payload || !payload.data) return;
  for(const [k,v] of Object.entries(payload.data)){
    await saveJSONRaw(k, v);
  }
  State.logs = {}; // clear in-memory log cache so re-reads pick up imported data
}

/* Parse a downloaded backup file and summarize what it contains, without writing anything. */
async function parseBackupFile(file){
  const text = await file.text();
  const backup = JSON.parse(text);
  if(!backup || typeof backup!=="object" || !backup.data) throw new Error("This doesn't look like a Century Ready backup file.");
  const logDates = Object.keys(backup.data).filter(k=>k.startsWith("log:")).map(k=>k.replace("log:","")).sort();
  const wlCount = backup.data.workoutLibrary ? Object.keys(backup.data.workoutLibrary).length : 0;
  const elCount = backup.data.exerciseLibrary ? Object.keys(backup.data.exerciseLibrary).length : 0;
  return {backup, logDates, wlCount, elCount, savedAt: backup.updatedAt};
}

/* Safe merge: only fills in data that's currently MISSING locally. Never overwrites
   an existing logged day, or an existing custom workout/exercise with the same id. */
async function importBackupMerge(backup){
  let restoredLogs = 0, restoredWorkouts = 0, restoredExercises = 0;
  for(const [k, v] of Object.entries(backup.data||{})){
    if(k.startsWith("log:")){
      const existing = await loadJSON(k);
      const hasContent = existing && ((existing.workouts && Object.keys(existing.workouts).length) || existing.bodyweight || (existing.nutrition && Object.keys(existing.nutrition).length));
      if(!hasContent){ await saveJSONRaw(k, v); restoredLogs++; }
    } else if(k==="workoutLibrary"){
      const existing = (await loadJSON(k)) || {};
      let changed=false;
      for(const [wid,wdata] of Object.entries(v||{})){ if(!existing[wid]){ existing[wid]=wdata; changed=true; restoredWorkouts++; } }
      if(changed) await saveJSONRaw(k, existing);
    } else if(k==="exerciseLibrary"){
      const existing = (await loadJSON(k)) || {};
      let changed=false;
      for(const [eid,edata] of Object.entries(v||{})){ if(!existing[eid]){ existing[eid]=edata; changed=true; restoredExercises++; } }
      if(changed) await saveJSONRaw(k, existing);
    }
    // profile, planStart, dailyQueue, dayOverrides, weightHistory intentionally left alone in merge mode
  }
  // rebuild weight history from whatever's now logged, so the Progress chart reflects restored entries
  const allLogKeys = await listKeys("log:");
  const weightHistory = [];
  for(const lk of allLogKeys){
    const log = await loadJSON(lk);
    if(log && log.bodyweight) weightHistory.push({date: log.date || lk.replace("log:",""), weight: parseFloat(log.bodyweight)});
  }
  weightHistory.sort((a,b)=>a.date.localeCompare(b.date));
  await saveJSONRaw("weightHistory", weightHistory);
  State.logs = {};
  return {restoredLogs, restoredWorkouts, restoredExercises};
}

async function pullFromDrive(){
  if(!Drive.connected || !Drive.fileId) return;
  const ok = await ensureFreshToken();
  if(!ok) return;
  const resp = await fetch(`https://www.googleapis.com/drive/v3/files/${Drive.fileId}?alt=media`, {
    headers:{Authorization:"Bearer "+Drive.accessToken}
  });
  if(!resp.ok) return;
  const remote = await resp.json();
  const localMeta = await loadJSON("driveSyncMeta");
  const remoteTime = remote.updatedAt ? new Date(remote.updatedAt).getTime() : 0;
  const localTime = localMeta && localMeta.lastLocalWrite ? new Date(localMeta.lastLocalWrite).getTime() : 0;
  if(remoteTime > localTime && remote.data && Object.keys(remote.data).length){
    await importAllData(remote);
    await saveJSONRaw("driveSyncMeta", {lastLocalWrite: remote.updatedAt});
    // reload the whole app state from the newly-imported data
    if(typeof init==="function"){ await init(); }
  }
}

async function pushToDrive(){
  if(!Drive.connected || !Drive.fileId || Drive.syncing) return;
  Drive.syncing = true;
  try{
    const ok = await ensureFreshToken();
    if(!ok) throw new Error("session expired — click Connect again");
    const bundle = await exportAllData();
    await saveJSONRaw("driveSyncMeta", {lastLocalWrite: bundle.updatedAt});
    await fetch(`https://www.googleapis.com/upload/drive/v3/files/${Drive.fileId}?uploadType=media`, {
      method:"PATCH",
      headers:{Authorization:"Bearer "+Drive.accessToken, "Content-Type":"application/json"},
      body: JSON.stringify(bundle),
      keepalive: true
    });
    Drive.lastSyncAt = new Date().toISOString();
    Drive.dirtySincePush = false;
    Drive.dirtySince = null;
    Drive.lastError = null;
  } catch(e){
    console.error("Drive push failed", e);
    Drive.lastError = "Sync failed — will retry on next change.";
  } finally {
    Drive.syncing = false;
    if(typeof renderDriveStatus==="function") renderDriveStatus();
  }
}

function scheduleDrivePush(){
  if(!Drive.connected) return;
  Drive.dirtySincePush = true;
  const now = Date.now();
  if(!Drive.dirtySince) Drive.dirtySince = now;
  if(Drive.pushTimer) clearTimeout(Drive.pushTimer);
  const elapsed = now - Drive.dirtySince;
  const wait = Math.min(DRIVE_PUSH_DEBOUNCE_MS, Math.max(200, DRIVE_PUSH_MAX_WAIT_MS - elapsed));
  Drive.pushTimer = setTimeout(pushToDrive, wait);
}

function disconnectDrive(){
  Drive.connected = false;
  Drive.accessToken = null;
  Drive.userEmail = null;
  if(Drive.pollTimer){ clearInterval(Drive.pollTimer); Drive.pollTimer = null; }
  if(typeof renderTabContent==="function") renderTabContent();
}

/* Decide which icon best represents a resolved workout object (kind/platform/bodyGroup) */
function iconForWorkout(w){
  if(!w) return ICONS.rest;
  if(w.isRace) return ICONS.trophy;
  if(w.kind==="cycling"){
    if(w.platform==="Outdoor") return ICONS.bikeOutdoor;
    if(w.source==="rouvy" && (w.platform||"").includes("Route")) return ICONS.route;
    return ICONS.bikeIndoor;
  }
  if(w.kind==="strengthblock"){
    const bg = w.bodyGroup;
    if(bg==="upper") return ICONS.strengthUpper;
    if(bg==="lower") return ICONS.strengthLower;
    if(bg==="core") return ICONS.core;
    if(bg==="mobility") return ICONS.mobility;
    if(bg==="recovery") return ICONS.recovery;
    return ICONS.weight;
  }
  if(w.kind==="run") return ICONS.run;
  return ICONS.rest;
}
function iconForExercise(ex){
  if(!ex) return ICONS.core;
  const bg = ex.bodyGroup;
  if(bg==="upper") return ICONS.strengthUpper;
  if(bg==="lower") return ICONS.strengthLower;
  if(bg==="core") return ICONS.core;
  if(bg==="mobility") return ICONS.mobility;
  if(bg==="recovery") return ICONS.recovery;
  return ICONS.weight;
}
/* wraps an icon in the colored "chip" used in workout item headers */
function wiIconChip(w){
  const warm = w && (w.isRace || w.isLongRide);
  const neutral = w && w.kind==="rest";
  const cls = warm ? "warm" : (neutral ? "neutral" : "");
  return `<div class="wi-icon ${cls}">${iconForWorkout(w)}</div>`;
}
function typeIconChip(w){
  const warm = w && (w.isRace || w.isLongRide);
  const cls = warm ? "warm" : "";
  return `<div class="type-icon ${cls}">${iconForWorkout(w)}</div>`;
}
/* ============================================================
   STORAGE POLYFILL — lets this exact file run standalone in any
   Chrome browser (desktop or mobile), not only inside Claude.ai.
   If the Claude.ai artifact storage API is present, it's used as-is;
   otherwise we fall back to the browser's own localStorage.
   ============================================================ */
(function ensureStoragePolyfill(){
  if(window.storage && typeof window.storage.get==="function") return;
  const NS = "centuryReady:";
  function k(key){ return NS+key; }
  window.storage = {
    get: async (key) => {
      let raw = null;
      try{ raw = localStorage.getItem(k(key)); } catch(e){ throw new Error("storage unavailable"); }
      if(raw===null) return Promise.reject(new Error("not found"));
      return {key, value:raw};
    },
    set: async (key, value) => { localStorage.setItem(k(key), value); return {key, value}; },
    delete: async (key) => { localStorage.removeItem(k(key)); return {key, deleted:true}; },
    list: async (prefix) => {
      const keys = [];
      for(let i=0;i<localStorage.length;i++){
        const full = localStorage.key(i);
        if(full && full.startsWith(NS)){ const bare = full.slice(NS.length); if(!prefix || bare.startsWith(prefix)) keys.push(bare); }
      }
      return {keys};
    }
  };
  window._usingLocalStoragePolyfill = true;
})();

/* ---------------- PROFILE / ZONE / NUTRITION MATH ---------------- */
function bmi(weightLb, heightIn){ const kg=weightLb*0.453592, m=heightIn*0.0254; return kg/(m*m); }
function bmiCategory(v){ if(v<18.5) return "Underweight"; if(v<25) return "Normal"; if(v<30) return "Overweight"; return "Higher range"; }
function bmr(p){ const kg=p.weightLb*0.453592, cm=p.heightIn*2.54; const base=10*kg+6.25*cm-5*p.age; return p.sex==="male"?base+5:base-161; }
function tdeeBaseline(p){ return bmr(p)*parseFloat(p.activity); }
function workoutKcal(day, p){
  if(!day) return 0;
  const wKg = p.weightLb*0.453592;
  let kcal = 0;
  day.workouts.forEach(w=>{
    if(w.kind==="cycling"){
      const mets = w.isRace ? 8 : (w.timeMin>=150 ? 7 : (w.zoneText&&w.zoneText.includes("Zone 5")?9:(w.zoneText&&w.zoneText.includes("Sweet Spot")?8.5:6.5)));
      kcal += mets*3.5*wKg/200*w.timeMin;
    } else if(w.kind==="run"){
      kcal += 8*3.5*wKg/200*w.timeMin;
    } else if(w.kind==="strengthblock"){
      kcal += 5*3.5*wKg/200*w.timeMin;
    }
  });
  return Math.round(kcal);
}
function nutritionTargets(day, p){
  const wKg = p.weightLb*0.453592;
  const base = tdeeBaseline(p);
  const extra = workoutKcal(day, p);
  const kcal = Math.round(base+extra);
  let carbFactor = 3;
  if(day){
    if(day.type==="race" || (day.workouts||[]).some(w=>w.isLongRide)) carbFactor = 7.5;
    else if(day.type==="indoor" || day.type==="outdoor") carbFactor = 5;
    else if(day.type==="strength") carbFactor = 4;
    else carbFactor = 3;
  }
  const carbsG = Math.round(carbFactor*wKg);
  const proteinG = Math.round(1.6*wKg);
  const fatG = Math.round((kcal*0.25)/9);
  const trainMin = day ? day.workouts.reduce((s,w)=>s+(w.timeMin||0),0) : 0;
  const waterOz = Math.round(0.5*p.weightLb + (trainMin/60)*20);
  return {kcal, carbsG, proteinG, fatG, waterOz, carbFactor, trainMin};
}
