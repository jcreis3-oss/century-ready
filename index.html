async function init(){
  State.profile = (await loadJSON("profile")) || {...DEFAULT_PROFILE};
  State.weightHistory = (await loadJSON("weightHistory")) || [];
  await loadLibraries();
  await initPlan();
  await initWeather();
  await initDriveSync();

  let today = todayISO();
  const dates = allCalendarDates();
  if(!dates.includes(today)){
    today = today < dates[0] ? dates[0] : dates[dates.length-1];
  }
  State.selectedDate = today;
  const dp = getDayPlan(today);
  State.openWeek = dp ? dp.weekNum : 1;
  render();
}

function render(){
  root.innerHTML = `
    ${renderHeader()}
    ${renderTabs()}
    <div id="tabcontent"></div>
    <div id="modal-root"></div>
    <div class="footer-note">Century Ready · Built for the ${esc(EVENT.name)}, ${esc(fmtDateLong(EVENT.date))} · Data stays on this device</div>
  `;
  renderTabContent();
}

function renderModalRoot(){
  const m = document.getElementById("modal-root");
  if(!m) return;
  if(State._openModal==="weather") m.innerHTML = weatherFormModal();
  else if(State._openModal==="skip") m.innerHTML = skipSwapModal(State._modalDate);
  else if(State._openModal==="swap") m.innerHTML = swapModal(State._modalDate);
  else { m.innerHTML = ""; return; }
  wireModalEvents(m);
}

function wireModalEvents(m){
  m.querySelectorAll("[data-close-modal]").forEach(b=>b.addEventListener("click",()=>{ State._openModal=null; renderModalRoot(); }));
  m.querySelectorAll("[data-save-weather-loc]").forEach(b=>b.addEventListener("click", async ()=>{
    const v = document.getElementById("weather-loc-input").value.trim();
    if(v){ State._openModal=null; renderModalRoot(); await setWeatherLocation(v); renderWeatherWidget(); }
  }));
  m.querySelectorAll("[data-confirm-skip]").forEach(b=>b.addEventListener("click",()=>{
    const date=b.dataset.confirmSkip; const n=parseInt(document.getElementById("skip-count-select").value);
    const res=skipDays(date,n); State._openModal=null; render(); if(res && res.msg) setTimeout(()=>alert(res.msg),50);
  }));
  m.querySelectorAll("[data-confirm-swap]").forEach(b=>b.addEventListener("click",()=>{
    const dateA=b.dataset.confirmSwap; const dateB=document.getElementById("swap-target-select").value;
    const res=swapDays(dateA,dateB); State._openModal=null; render(); if(res && res.msg) setTimeout(()=>alert(res.msg),50);
  }));
}

function renderHeader(){
  const d = daysUntilEvent();
  const dp = getDayPlan(State.selectedDate);
  return `
  <div class="app-header">
    <div class="eyebrow">Training Plan · Started ${esc(fmtDate(Plan.start))}</div>
    <h1>Century Ready</h1>
    <p class="sub">${esc(EVENT.name)} — ${esc(EVENT.location)} · ${esc(fmtDateLong(EVENT.date))}</p>
    <div class="header-stats" id="header-stats-row">
      <div class="stat-pill hero"><div class="num">${d}</div><div class="lbl">Days to go</div></div>
      <div class="stat-pill"><div class="num">${dp?("Wk "+dp.weekNum+"/10"):"—"}</div><div class="lbl">${dp?esc(dp.phaseLabel):""}</div></div>
      <div class="stat-pill"><div class="num">${State.profile.ftp}W</div><div class="lbl">Current FTP</div></div>
      <div id="clock-widget"></div>
      <div id="weather-widget"></div>
    </div>
  </div>`;
}

function renderClockWidget(){
  const el = document.getElementById("clock-widget");
  if(!el) return;
  const now = new Date();
  const dateStr = now.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'});
  const timeStr = now.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});
  el.innerHTML = `<div class="stat-pill clock-tile" style="min-width:120px;">
    <div class="num" style="font-size:16px;">${timeStr}</div>
    <div class="lbl">${esc(dateStr)}</div>
  </div>`;
}
if(!window._clockInterval){
  window._clockInterval = setInterval(renderClockWidget, 15000);
}

function renderTabs(){
  const tabs = [["dashboard","Today"],["schedule","10-Week Schedule"],["profile","Profile & Zones"],["progress","Progress Log"],["editor","Workout & Exercise Editor"]];
  return `<div class="tabnav">${tabs.map(([id,label])=>`<button data-tab="${id}" class="${State.tab===id?'active':''}">${label}</button>`).join("")}</div>`;
}

function switchTab(id){
  State.tab = id;
  document.querySelectorAll(".tabnav button").forEach(b=>b.classList.toggle("active", b.dataset.tab===id));
  renderTabContent();
}

async function renderTabContent(){
  const el = document.getElementById("tabcontent");
  if(State.tab==="dashboard") el.innerHTML = await renderDashboard();
  else if(State.tab==="schedule") el.innerHTML = await renderSchedule();
  else if(State.tab==="profile") el.innerHTML = await renderProfile();
  else if(State.tab==="progress") el.innerHTML = await renderProgress();
  else if(State.tab==="editor") el.innerHTML = renderEditor();
  wireTabEvents();
  renderWeatherWidget();
  renderClockWidget();
  renderModalRoot();
  if(State.tab==="schedule" && State.scheduleView==="calendar"){
    const detailEl = document.getElementById("cal-day-detail");
    if(detailEl){
      detailEl.innerHTML = `<div class="card"><h2 style="font-size:15px; margin-bottom:10px;">${esc(fmtDateLong(State.calendarSelectedDate))}</h2>${await renderDayRow(State.calendarSelectedDate)}</div>`;
      wireTabEvents();
    }
  }
}

document.addEventListener("click", (e)=>{
  const tb = e.target.closest(".tabnav button");
  if(tb){ switchTab(tb.dataset.tab); return; }
  const wf = e.target.closest("[data-open-weather-form]");
  if(wf){ State._openModal="weather"; renderModalRoot(); return; }
  const wr = e.target.closest("[data-refresh-weather]");
  if(wr){ refreshWeather(); return; }
});

init();
/* ============================================================
   WEATHER WIDGET (renders into header)
   ============================================================ */
function renderWeatherWidget(){
  const el = document.getElementById("weather-widget");
  if(!el) return;
  if(!Weather.location){
    el.innerHTML = `<div class="stat-pill weather-tile" style="min-width:170px;">
      <div class="lbl" style="margin-bottom:6px;">Today's Weather</div>
      <button class="btn btn-ghost" style="background:rgba(255,255,255,0.14); border-color:rgba(255,255,255,0.3); color:#fff; padding:6px 10px; font-size:11.5px;" data-open-weather-form="1">Set location</button>
    </div>`;
    return;
  }
  if(Weather.loading && !Weather.data){
    el.innerHTML = `<div class="stat-pill weather-tile" style="min-width:170px;"><div class="lbl">Today's Weather</div><div style="font-size:12px;color:#cfe3f0;margin-top:6px;">Loading…</div></div>`;
    return;
  }
  if(Weather.error && !Weather.data){
    el.innerHTML = `<div class="stat-pill weather-tile" style="min-width:190px;"><div class="lbl">Today's Weather</div><div style="font-size:11.5px;color:#f3c9c9;margin-top:6px;">${esc(Weather.error)}</div><button class="btn btn-ghost" style="margin-top:6px; background:rgba(255,255,255,0.14); border-color:rgba(255,255,255,0.3); color:#fff; padding:4px 9px; font-size:11px;" data-refresh-weather="1">Retry</button></div>`;
    return;
  }
  const d = Weather.data;
  if(!d) return;
  const ago = Weather.fetchedAt ? Math.round((Date.now()-new Date(Weather.fetchedAt).getTime())/60000) : null;
  el.innerHTML = `
  <div class="stat-pill weather-tile" style="min-width:230px; cursor:pointer;" data-open-weather-form="1">
    <div class="lbl">Today's Weather · ${esc(d.resolvedLocation||Weather.location.label)}</div>
    <div style="display:flex; align-items:center; gap:10px; margin-top:4px;">
      ${weatherIconSVG(d.icon,34)}
      <div>
        <div class="num" style="font-size:22px;">${Math.round(d.tempF)}°F</div>
        <div style="font-size:11px; color:#cfe3f0;">${esc(d.condition||"")}</div>
      </div>
    </div>
    <div style="font-size:11px; color:#cfe3f0; margin-top:5px; max-width:210px; line-height:1.4;">${esc(d.forecastText||"")}</div>
    <div style="font-size:10px; color:#9dc0d6; margin-top:4px;">H ${Math.round(d.highF)}° / L ${Math.round(d.lowF)}° · Sunset ${esc(d.sunsetLocal||"—")} ${ago!=null?`· updated ${ago}m ago`:""}</div>
  </div>`;
}

function weatherFormModal(){
  const label = Weather.location ? Weather.location.label : "";
  return `
  <div class="modal-backdrop" id="weather-modal">
    <div class="modal-box">
      <h3 style="margin-bottom:10px;">Set weather location</h3>
      <p style="font-size:12.5px; color:var(--grey-600); margin-bottom:12px;">Enter a ZIP code or "City, State" — used for today's forecast and outdoor-ride safety checks. Refreshes automatically every 30 minutes.</p>
      <input type="text" id="weather-loc-input" placeholder="e.g. 21788 or Thurmont, MD" value="${esc(label)}" style="width:100%; border:1.5px solid var(--grey-200); border-radius:var(--radius-sm); padding:10px 12px; font-size:14px;">
      <div class="save-row" style="margin-top:14px; justify-content:flex-end;">
        <button class="btn btn-ghost" data-close-modal="1">Cancel</button>
        <button class="btn btn-primary" data-save-weather-loc="1">Save & Refresh</button>
      </div>
    </div>
  </div>`;
}

/* ============================================================
   WORKOUT ITEM COMPONENT
   ============================================================ */
function durationLogged(savedW){
  if(!savedW) return false;
  const h = parseInt(savedW.durationH)||0, m = parseInt(savedW.durationM)||0, s = parseInt(savedW.durationS)||0;
  return (h+m+s) > 0;
}
function durationTotalMinutes(savedW){
  if(!savedW) return 0;
  const h = parseInt(savedW.durationH)||0, m = parseInt(savedW.durationM)||0, s = parseInt(savedW.durationS)||0;
  return h*60 + m + s/60;
}

function completeCheckbox(uidStr, isCompleted){
  return `<label style="display:flex; align-items:center; cursor:pointer; flex-shrink:0;" title="Mark this workout completed">
    <input type="checkbox" data-complete="${uidStr}" ${isCompleted?'checked':''} style="width:19px; height:19px; accent-color:var(--green); cursor:pointer;">
  </label>`;
}

function timeOptions(max, selected){
  let out = "";
  for(let i=0;i<=max;i++){
    const v = String(i).padStart(2,'0');
    out += `<option value="${v}" ${String(selected)===v?'selected':''}>${v}</option>`;
  }
  return out;
}
function durationDropdowns(uidStr, savedW){
  const h = savedW.durationH ?? "00", m = savedW.durationM ?? "00", s = savedW.durationS ?? "00";
  return `
  <div class="field wide">
    <label>Actual Duration</label>
    <div class="time-picker">
      <select class="input-logged" data-f="durationH" data-uid="${uidStr}">${timeOptions(10,h)}</select><span class="tp-unit">h</span>
      <span class="tp-sep">:</span>
      <select class="input-logged" data-f="durationM" data-uid="${uidStr}">${timeOptions(59,m)}</select><span class="tp-unit">m</span>
      <span class="tp-sep">:</span>
      <select class="input-logged" data-f="durationS" data-uid="${uidStr}">${timeOptions(59,s)}</select><span class="tp-unit">s</span>
    </div>
  </div>`;
}

function renderWorkoutItem(dayPlan, wIndex, w, log){
  const date = dayPlan.date;
  const slotKey = w.slotKey;
  const uidStr = `${date}::${slotKey}`;
  const savedW = (log.workouts && log.workouts[slotKey]) || {};

  const reorderBtns = total>1 ? `

    const platBadge = w.platform==="Rouvy (Indoor)" ? "🚴 Rouvy" : (w.platform&&w.platform.startsWith("Rouvy") ? "🚴 "+w.platform : (w.platform==="Outdoor" ? "🌤 Outdoor" : ""));

    <div class="workout-item ${isCompleted?'completed':''}" data-uid="${uidStr}">
      <div class="wi-head" data-toggle="${uidStr}">

        ${completeCheckbox(uidStr, isCompleted)}
        <div class="wi-titlewrap">
          ${wiIconChip(w)}
          <div style="flex:1; min-width:0;">
            <div class="wi-title">${esc(w.name)} ${w.isRace?'🏆':''} ${savedBadge(uidStr)}</div>
            <div class="wi-desc">${esc(w.desc)}</div>
          </div>
        </div>
        <div class="wi-right">
          <span class="wi-time">${fmtHrs(w.timeMin)}${w.estMiles?` · ~${w.estMiles}mi`:""}</span>
          <svg class="chev ${isOpen?'open':''}" width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>
      <div class="wi-body ${isOpen?'open':''}">
        <div class="wi-target"><b>Target:</b> ${esc(w.zoneText||"")} ${w.targetTSS?` · TSS ~${w.targetTSS}`:""} ${platBadge?(" · "+platBadge):""} ${w.url?` · <a href="${esc(w.url)}" target="_blank" rel="noopener" style="color:var(--blue);">Open Rouvy Workout ↗</a>`:""}</div>
        <div class="field-grid">
          ${durationDropdowns(uidStr, savedW)}
          <div class="field"><label>Distance (mi)</label><input type="number" min="0" step="0.1" class="input-logged" data-f="distance" data-uid="${uidStr}" value="${savedW.distance??''}" placeholder="${w.estMiles||''}"></div>
          <div class="field"><label>Avg Power (W)</label><input type="number" min="0" class="input-logged" data-f="avgPower" data-uid="${uidStr}" value="${savedW.avgPower??''}"></div>
          <div class="field"><label>Avg HR (bpm)</label><input type="number" min="0" class="input-logged" data-f="avgHR" data-uid="${uidStr}" value="${savedW.avgHR??''}"></div>
          <div class="field"><label>Avg Cadence (rpm)</label><input type="number" min="0" class="input-logged" data-f="cadence" data-uid="${uidStr}" value="${savedW.cadence??''}"></div>
          <div class="field"><label>Elevation Gain (ft)</label><input type="number" min="0" class="input-logged" data-f="elevation" data-uid="${uidStr}" value="${savedW.elevation??''}"></div>
          <div class="field"><label>TSS</label><input type="number" min="0" class="input-logged" data-f="tss" data-uid="${uidStr}" value="${savedW.tss??''}"></div>
          <div class="field"><label>RPE (1–10)</label><input type="number" min="1" max="10" class="input-logged" data-f="rpe" data-uid="${uidStr}" value="${savedW.rpe??''}"></div>
          <div class="field wide"><label>Notes (nutrition on bike, how it felt, weather...)</label><textarea data-f="notes" data-uid="${uidStr}">${esc(savedW.notes||'')}</textarea></div>
        </div>
        <div class="save-row">
          <button class="btn btn-primary" data-save="${uidStr}">Save entry</button>
          <button class="btn btn-ghost" data-toggle-sub="${uidStr}" style="margin-left:auto;">${w.isRace?'':'Substitute workout'}</button>
          ${slotKey[0]==='a' ? `<button class="btn btn-ghost" data-remove-added="${uidStr}" style="color:var(--red);">Remove</button>` : ""}
        </div>
        ${!w.isRace ? renderSubPicker(uidStr, date, slotKey, "cycling", subOpen) : ""}

  }

  if(w.kind==="run"){
    return `
    <div class="workout-item ${isCompleted?'completed':''}" data-uid="${uidStr}">

        ${reorderBtns}

    const rows = w.items.map((it, ii)=>{
      const oi = it.origIndex;
      const key = `s${oi}`;
      const sv = savedW[key] || {};

          <button data-reorder-ex="${uidStr}" data-origidx="${oi}" data-dir="-1" ${ii===0?'disabled':''} style="border:1px solid var(--grey-200); background:#fff; border-radius:4px; width:18px; height:16px; font-size:9px; cursor:pointer; color:var(--grey-600); ${ii===0?'opacity:.3;':''}">▲</button>
          <button data-reorder-ex="${uidStr}" data-origidx="${oi}" data-dir="1" ${ii===itemCount-1?'disabled':''} style="border:1px solid var(--grey-200); background:#fff; border-radius:4px; width:18px; height:16px; font-size:9px; cursor:pointer; color:var(--grey-600); ${ii===itemCount-1?'opacity:.3;':''}">▼</button>

        <div style="width:26px; height:26px; border-radius:8px; background:var(--indigo-pale); color:var(--indigo); display:flex; align-items:center; justify-content:center; flex-shrink:0;">${(function(){const s=iconForExercise(it); return s.replace('<svg ','<svg style="width:14px;height:14px;" ');})()}</div>

          <div style="font-weight:700; font-size:13.5px; color:var(--navy);">${esc(it.name)}</div>
          <div style="font-size:12px; color:var(--grey-600); margin-top:2px;">${esc(it.desc)}</div>
          <div style="display:flex; align-items:center; gap:6px; margin-top:6px; flex-wrap:wrap;">
            <span style="font-size:11px; color:var(--grey-600); font-weight:700;">Target:</span>
            <input type="text" data-target="sets" data-uid="${uidStr}" data-exidx="${oi}" value="${esc(dispSets)}" style="width:44px; border:1px solid var(--grey-200); border-radius:4px; padding:3px 5px; font-size:11.5px;"> sets ×

          <div class="field" style="width:80px;"><label>Weight</label><input type="text" class="input-logged" data-f="${key}_weight" data-uid="${uidStr}" value="${esc(sv.weight||'')}" placeholder="lb/band"></div>

      <div class="wi-head" data-toggle="${uidStr}">
        ${reorderBtns}
        ${completeCheckbox(uidStr, isCompleted)}
        <div class="wi-titlewrap">
          ${wiIconChip(w)}
          <div style="flex:1; min-width:0;">
            <div class="wi-title">${esc(w.title)} ${savedBadge(uidStr)}</div>
            <div class="wi-desc">${w.items.length} exercise${w.items.length===1?'':'s'} · ${esc(w.desc||"")}</div>
          </div>
        </div>

/* Fetch the last N days of logs once, then allow cheap synchronous extraction
   of the 3 most recent distinct values for any nutrition/check-in field. */
async function buildRecentValueLookup(beforeDate, lookbackDays){
  lookbackDays = lookbackDays || 30;
  const allDates = allCalendarDates().filter(d=>d<beforeDate).sort((a,b)=>b.localeCompare(a)).slice(0,lookbackDays);
  const logs = [];
  for(const d of allDates){ logs.push(await getLog(d)); }
  return function extract(fieldPath, limit){
    limit = limit || 3;
    const seen = [];
    for(const log of logs){
      const val = fieldPath.startsWith("nutrition.")
        ? (log.nutrition && log.nutrition[fieldPath.slice(10)])
        : log[fieldPath];
      if(val!==undefined && val!==null && val!=="" && !seen.includes(val)){
        seen.push(val);
        if(seen.length>=limit) break;
      }
    }
    return seen;
  };
}
function datalistFor(inputId, values){
  if(!values || !values.length) return "";
  return `<datalist id="${inputId}">${values.map(v=>`<option value="${esc(v)}"></option>`).join("")}</datalist>`;
}

function renderNutritionWidget(day, log, isOpen, recent){
  const targets = nutritionTargets(day, State.profile);
  const n = log.nutrition || {};
  function box(label,key,target,unit,step){
    const val = n[key] ?? "";
    const pct = val ? Math.min(150, Math.round((parseFloat(val)/target)*100)) : 0;
    const dlId = `dl-nutri-${key}-${day.date}`;
    const vals = recent ? recent("nutrition."+key) : [];
    return `<div class="nutri-box"><div class="nlabel">${label}</div>
      <input type="number" min="0" step="${step||1}" list="${dlId}" data-nutri="${key}" value="${val}" ${isOpen?'':'disabled'} style="border:none;background:transparent;font-family:var(--font-display);font-size:20px;font-weight:700;color:var(--navy);width:100%;padding:0;margin-top:4px;" placeholder="0">
      ${datalistFor(dlId, vals)}
      <div class="ntarget">of ${target}${unit} target</div><div class="bar-track"><div class="bar-fill ${pct>105?'over':''}" style="width:${Math.min(100,pct)}%"></div></div></div>`;
  }
  const grid = `<div class="nutri-grid">${box("Food (kcal)","kcal",targets.kcal,"","10")}${box("Carbs (g)","carbs",targets.carbsG,"g","1")}${box("Protein (g)","protein",targets.proteinG,"g","1")}${box("Fat (g)","fat",targets.fatG,"g","1")}${box("Water (oz)","water",targets.waterOz,"oz","1")}</div>`;
  if(!isOpen) return grid;
  return grid + `
  <div class="info-callout"><b>Why these numbers:</b> Baseline calories come from your profile (Mifflin-St Jeor BMR × activity) plus an estimate for today's training load. Carbs scale up on long-ride/race days (~7.5 g/kg) and stay moderate on rest days (~3 g/kg). Protein targets 1.6 g/kg daily. Fat targets ~25% of total calories. Water = 0.5 oz/lb bodyweight + ~20 oz per hour trained.</div>
  <div class="save-row"><button class="btn btn-primary" data-save-nutri="${day.date}">Save nutrition</button></div>`;
}

  for(const wnStr of Object.keys(weeks).sort((a,b)=>a-b)){

function navCalendarMonth(delta){
  const [y,m] = (State.calendarMonth||Plan.start.slice(0,7)).split("-").map(Number);
  const nd = new Date(y, m-1+delta, 1);
  State.calendarMonth = `${nd.getFullYear()}-${String(nd.getMonth()+1).padStart(2,'0')}`;
}

function workoutIsLogged(w, savedW){
  if(!savedW) return false;
  if(w.kind==="cycling" || w.kind==="run") return durationLogged(savedW);
  if(w.kind==="strengthblock"){
    return w.items.some(it=>{ const k = savedW["s"+it.origIndex]; return k && (k.sets || k.reps); });
  }
  return false;
}
function workoutIsCompleted(savedW){ return !!(savedW && savedW.completed); }
function isDayFullyCompleted(day, log){
  if(!day || !day.workouts.length) return false;
  return day.workouts.every(w => workoutIsCompleted(log.workouts && log.workouts[w.slotKey]));
}
/* 'start' | 'completed' | 'incomplete' | null(no special coloring — rest day, today, or future) */
async function dayCompletionStatus(date){
  if(date === Plan.start) return "start";
  if(date >= todayISO()) return null;
  const dp = getDayPlan(date);
  if(!dp || !dp.workouts.length) return null;
  const log = await getLog(date);
  return isDayFullyCompleted(dp, log) ? "completed" : "incomplete";
}

async function renderCalendarView(){
  const allDates = allCalendarDates();
  if(!State.calendarMonth) State.calendarMonth = (State.selectedDate||todayISO()).slice(0,7);
  if(!State.calendarSelectedDate) State.calendarSelectedDate = State.selectedDate||todayISO();
  const [y,m] = State.calendarMonth.split("-").map(Number);
  const firstOfMonth = new Date(y, m-1, 1);
  const startDow = firstOfMonth.getDay();
  const daysInMonth = new Date(y, m, 0).getDate();
  const monthLabel = firstOfMonth.toLocaleDateString('en-US',{month:'long', year:'numeric'});

  const cells = [];
  for(let i=0;i<startDow;i++) cells.push(null);
  for(let d=1; d<=daysInMonth; d++) cells.push(`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`);

  const statusByDate = {};
  for(const iso of cells){
    if(iso && allDates.includes(iso)) statusByDate[iso] = await dayCompletionStatus(iso);
  }

  let grid = `<div class="card" style="padding:18px 20px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">
      <button class="btn btn-ghost" data-cal-nav="-1">← Prev</button>
      <h3 style="font-size:16px;">${esc(monthLabel)}</h3>
      <button class="btn btn-ghost" data-cal-nav="1">Next →</button>
    </div>
    <div style="display:grid; grid-template-columns:repeat(7,1fr); gap:6px; font-size:10.5px; font-weight:700; color:var(--ink-600); text-transform:uppercase; margin-bottom:6px; text-align:center;">
      ${["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d=>`<div>${d}</div>`).join("")}
    </div>
    <div style="display:grid; grid-template-columns:repeat(7,1fr); gap:6px;">
      ${cells.map(iso=>{
        if(!iso) return `<div class="cal-cell cal-empty"></div>`;
        const inPlan = allDates.includes(iso);
        if(!inPlan) return `<div class="cal-cell cal-outside">${dayNum(iso)}</div>`;
        const isSelected = iso===State.calendarSelectedDate;
        const isToday = iso===todayISO();
        const status = statusByDate[iso];
        const cls = ["cal-cell"];
        if(status==="start") cls.push("cal-start");
        else if(status==="completed") cls.push("cal-completed");
        else if(status==="incomplete") cls.push("cal-incomplete");
        if(isToday) cls.push("cal-today");
        if(isSelected) cls.push("cal-selected");
        const dp = getDayPlan(iso);
        const dots = dp.workouts.slice(0,4).map(w=>`<span style="display:inline-block;width:14px;height:14px;border-radius:5px;background:${status==='start'?'rgba(255,255,255,0.3)':'var(--grey-100)'};margin:1px;">${iconForWorkout(w).replace('<svg ','<svg style="width:10px;height:10px;" ')}</span>`).join("");
        return `<div class="${cls.join(' ')}" data-cal-day="${iso}">
          <div class="cal-daynum">${dayNum(iso)}${status==='start'?' 🚩':''}</div>
          <div class="cal-daytitle">${esc(dp.title.length>16?dp.title.slice(0,15)+'…':dp.title)}</div>
          <div style="margin-top:3px; display:flex; flex-wrap:wrap;">${dots}</div>
        </div>`;
      }).join("")}
    </div>
    <div class="cal-legend">
      <div class="lg-item"><span class="lg-swatch" style="background:var(--grad-primary);"></span>Program start</div>
      <div class="lg-item"><span class="lg-swatch" style="background:#F4F6F5; border:1.5px solid var(--green);"></span>Completed</div>
      <div class="lg-item"><span class="lg-swatch" style="background:#F6F5F0; border:1.5px solid var(--yellow);"></span>Not fully logged</div>
      <div class="lg-item"><span class="lg-swatch" style="background:#fff; border:1.5px solid var(--grad-warm-1);"></span>Today</div>
    </div>
  </div>`;

  return grid + `<div id="cal-day-detail"></div>`;
}

  const logView = complianceRows.length ? `<table class="progress-table"><thead><tr><th>Date</th><th>Workout Entries</th><th>Weight</th><th>Sleep</th><th>Nutrition Logged</th><th>Notes</th></tr></thead><tbody>
      ${complianceRows.map(l=>`<tr data-goto-day="${l.date}"><td>${esc(fmtDate(l.date))}</td><td>${l.workouts?Object.keys(l.workouts).length:0}</td><td>${l.bodyweight?l.bodyweight+' lb':'—'}</td><td>${l.sleep?l.sleep+' hr':'—'}</td><td>${l.nutrition&&Object.keys(l.nutrition).length?(l.nutrition.kcal||'—')+' kcal':'—'}</td><td style="max-width:220px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${esc(l.notes||'')}</td></tr>`).join("")}
    </tbody></table>` : `<div class="empty-state"><h3>No entries yet</h3><p>Log a workout or check-in on the Today tab and it will show up here.</p></div>`;

  const calView = await renderProgressCalendar(loggedDateSet);

  return `
  <div class="two-col">
    <div class="card"><div class="card-header"><h2>Body Weight Trend</h2><span class="meta">Last 14 logged entries</span></div>${sparkline}</div>
    <div class="card"><div class="card-header"><h2>Plan Snapshot</h2></div>
      <div class="calc-box">
        <div class="cline"><span>Days logged</span><span>${complianceRows.length}</span></div>
        <div class="cline"><span>Days into plan</span><span>${Math.max(0,daysBetween(Plan.start, todayISO())+1)} of ${allCalendarDates().length}</span></div>
        <div class="cline"><span>Days to race</span><span>${daysUntilEvent()}</span></div>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-header">
      <h2>Logged Days</h2>
      <div class="pill-toggle">
        <button class="${view==='list'?'active':''}" data-progress-view="list">List</button>
        <button class="${view==='calendar'?'active':''}" data-progress-view="calendar">Calendar</button>
      </div>
    </div>
    <p style="font-size:12px; color:var(--ink-600); margin-bottom:10px;">Click any day to jump to it in the 10-Week Schedule.</p>
    ${view==='list' ? logView : calView}
  </div>`;
}

async function renderProgressCalendar(loggedDateSet){
  const allDates = allCalendarDates();
  if(!State.progressCalMonth) State.progressCalMonth = (State.selectedDate||todayISO()).slice(0,7);
  const [y,m] = State.progressCalMonth.split("-").map(Number);
  const firstOfMonth = new Date(y, m-1, 1);
  const startDow = firstOfMonth.getDay();
  const daysInMonth = new Date(y, m, 0).getDate();
  const monthLabel = firstOfMonth.toLocaleDateString('en-US',{month:'long', year:'numeric'});
  const cells = [];
  for(let i=0;i<startDow;i++) cells.push(null);
  for(let d=1; d<=daysInMonth; d++) cells.push(`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`);

  return `
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">
    <button class="btn btn-ghost" data-progresscal-nav="-1">← Prev</button>
    <h3 style="font-size:15px;">${esc(monthLabel)}</h3>
    <button class="btn btn-ghost" data-progresscal-nav="1">Next →</button>
  </div>
  <div style="display:grid; grid-template-columns:repeat(7,1fr); gap:6px; font-size:10.5px; font-weight:700; color:var(--ink-600); text-transform:uppercase; margin-bottom:6px; text-align:center;">
    ${["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d=>`<div>${d}</div>`).join("")}
  </div>
  <div style="display:grid; grid-template-columns:repeat(7,1fr); gap:6px;">
    ${cells.map(iso=>{
      if(!iso) return `<div class="cal-cell cal-empty"></div>`;
      const inPlan = allDates.includes(iso);
      if(!inPlan) return `<div class="cal-cell cal-outside">${dayNum(iso)}</div>`;
      const logged = loggedDateSet.has(iso);
      const isStart = iso===Plan.start;
      const cls = ["cal-cell"];
      if(isStart) cls.push("cal-start"); else if(logged) cls.push("cal-completed");
      if(iso===todayISO()) cls.push("cal-today");
      return `<div class="${cls.join(' ')}" data-goto-day="${iso}">
        <div class="cal-daynum">${dayNum(iso)}</div>
        ${logged?'<div class="cal-daytitle">✓ Logged</div>':''}
      </div>`;
    }).join("")}
  </div>
  <div class="cal-legend">
    <div class="lg-item"><span class="lg-swatch" style="background:var(--grad-primary);"></span>Program start</div>
    <div class="lg-item"><span class="lg-swatch" style="background:#F4F6F5; border:1.5px solid var(--green);"></span>Has a logged entry</div>
  </div>`;
}

function wireTabEvents(){
  const el = document.getElementById("tabcontent");
  if(!el) return;

  el.querySelectorAll("[data-toggle]").forEach(h=>h.addEventListener("click",(e)=>{
    if(e.target.closest("[data-reorder-workout]")) return;
    const u=h.dataset.toggle; State._openItems[u]=!State._openItems[u];
    const item=document.querySelector(`.workout-item[data-uid="${u}"]`);
    item.querySelector(".wi-body").classList.toggle("open"); item.querySelector(".chev").classList.toggle("open");
  }));
  el.querySelectorAll("[data-toggle-card]").forEach(h=>h.addEventListener("click",()=>{
    const key = h.dataset.toggleCard;
    State._openItems[key] = !State._openItems[key];
    renderTabContent();
  }));
  el.querySelectorAll("[data-selectday]").forEach(p=>p.addEventListener("click",()=>{ State.selectedDate=p.dataset.selectday; renderTabContent(); }));
  el.querySelectorAll("[data-toggleweek]").forEach(h=>h.addEventListener("click",()=>{ const n=parseInt(h.dataset.toggleweek); State.openWeek=State.openWeek===n?null:n; renderTabContent(); }));
  el.querySelectorAll("[data-save]").forEach(btn=>btn.addEventListener("click",async()=>{
    const {date,slotKey}=parseUid(btn.dataset.save);
    await saveWorkoutEntry(date, slotKey, btn.dataset.save);
  }));
  el.querySelectorAll("[data-complete]").forEach(cb=>cb.addEventListener("click",(e)=>e.stopPropagation()));
  el.querySelectorAll("[data-complete]").forEach(cb=>cb.addEventListener("change", async ()=>{
    const {date,slotKey}=parseUid(cb.dataset.complete);
    const log = await getLog(date);
    log.workouts = log.workouts || {};
    log.workouts[slotKey] = log.workouts[slotKey] || {};
    log.workouts[slotKey].completed = cb.checked;
    await saveLog(date, log);
    renderTabContent();
  }));
  el.querySelectorAll("[data-save-nutri]").forEach(btn=>btn.addEventListener("click",()=>saveNutrition(btn.dataset.saveNutri)));
  el.querySelectorAll("[data-save-checkin]").forEach(btn=>btn.addEventListener("click",()=>saveCheckin(btn.dataset.saveCheckin)));
  el.querySelectorAll("[data-save-profile]").forEach(btn=>btn.addEventListener("click",saveProfile));

  el.querySelectorAll("[data-toggle-sub]").forEach(btn=>btn.addEventListener("click",()=>{
    const u="sub_"+btn.dataset.toggleSub; State._openItems[u]=!State._openItems[u]; renderTabContent();

  el.querySelectorAll("[data-subsearch]").forEach(inp=>inp.addEventListener("input",()=>{

  el.querySelectorAll("[data-pick-sub]").forEach(btn=>btn.addEventListener("click",()=>{
    const {date,slotKey}=parseUid(btn.dataset.pickSub);

  }));
  el.querySelectorAll("[data-revert-slot]").forEach(btn=>btn.addEventListener("click",()=>{
    const {date,slotKey}=parseUid(btn.dataset.revertSlot);
    revertSlot(date, slotKey); renderTabContent();
  }));
  el.querySelectorAll("[data-remove-added]").forEach(btn=>btn.addEventListener("click",()=>{

    removeAddedWorkout(date, slotKey); renderTabContent();
  }));
  el.querySelectorAll("[data-remove-workout]").forEach(btn=>btn.addEventListener("click",()=>{

    renderTabContent();
  }));
  el.querySelectorAll("[data-toggle-addex]").forEach(btn=>btn.addEventListener("click",()=>{
    const key = "addex_"+btn.dataset.toggleAddex;

  }));
  el.querySelectorAll("[data-addex-search]").forEach(inp=>inp.addEventListener("input",()=>{

  }));

  el.querySelectorAll("[data-target]").forEach(inp=>inp.addEventListener("change", async ()=>{

    await saveLog(date, log); renderTabContent();
  }));

  el.querySelectorAll("[data-open-skip]").forEach(btn=>btn.addEventListener("click",()=>{ State._openModal="skip"; State._modalDate=btn.dataset.openSkip; renderModalRoot(); }));

  el.querySelectorAll("[data-dismiss-weather-alert]").forEach(b=>b.addEventListener("click",()=>{ State._dismissWeatherAlert=true; renderTabContent(); }));

  el.querySelectorAll("[data-view-toggle]").forEach(b=>b.addEventListener("click",()=>{ State.scheduleView=b.dataset.viewToggle; renderTabContent(); }));
  el.querySelectorAll("[data-cal-nav]").forEach(b=>b.addEventListener("click",()=>{ navCalendarMonth(parseInt(b.dataset.calNav)); renderTabContent(); }));
  el.querySelectorAll("[data-cal-day]").forEach(b=>b.addEventListener("click",()=>{ State.calendarSelectedDate=b.dataset.calDay; renderTabContent(); }));

  el.querySelectorAll("[data-progress-view]").forEach(b=>b.addEventListener("click",()=>{ State.progressView=b.dataset.progressView; renderTabContent(); }));
  el.querySelectorAll("[data-progresscal-nav]").forEach(b=>b.addEventListener("click",()=>{

  el.querySelectorAll("[data-drive-save-clientid]").forEach(b=>b.addEventListener("click", async ()=>{

    renderDriveStatus();
  }));
  el.querySelectorAll("[data-drive-connect]").forEach(b=>b.addEventListener("click", connectDrive));
  el.querySelectorAll("[data-drive-sync-now]").forEach(b=>b.addEventListener("click", async ()=>{ if(Drive.dirtySincePush) await pushToDrive(); await pullFromDrive(); renderDriveStatus(); }));
  el.querySelectorAll("[data-drive-disconnect]").forEach(b=>b.addEventListener("click", disconnectDrive));

  el.querySelectorAll("#backup-file-input").forEach(inp=>inp.addEventListener("change", async ()=>{
    const file = inp.files[0];
    if(!file) return;
    const preview = document.getElementById("backup-preview");
    preview.innerHTML = `<p style="font-size:12px;color:var(--ink-600);margin-top:8px;">Reading file…</p>`;
    try{
      const {backup, logDates, wlCount, elCount, savedAt} = await parseBackupFile(file);
      State._pendingBackup = backup;
      preview.innerHTML = `
        <div class="calc-box" style="margin-top:10px;">
          <div class="cline"><span>Backup saved at</span><span>${savedAt?new Date(savedAt).toLocaleString():'unknown'}</span></div>
          <div class="cline"><span>Logged days in file</span><span>${logDates.length}</span></div>
          <div class="cline"><span>Date range</span><span>${logDates.length?esc(fmtDate(logDates[0]))+' → '+esc(fmtDate(logDates[logDates.length-1])):'—'}</span></div>
          <div class="cline"><span>Custom workouts in file</span><span>${wlCount}</span></div>
          <div class="cline"><span>Custom exercises in file</span><span>${elCount}</span></div>
        </div>
        <div class="save-row">
          <button class="btn btn-primary" data-import-merge="1">Fill In Missing Data Only</button>
          <button class="btn btn-ghost" data-import-replace="1" style="color:var(--red);">Replace Everything With This File</button>
        </div>
        <p style="font-size:11px;color:var(--ink-600);margin-top:6px;">"Fill In Missing" only restores days/workouts/exercises that aren't already here — it will never overwrite anything you currently have. "Replace Everything" discards current data on this device and uses only what's in this file.</p>
      `;
      // these buttons were just created, so wire them directly rather than relying on the
      // outer wireTabEvents pass (which already ran before this HTML existed)
      preview.querySelector("[data-import-merge]").addEventListener("click", async ()=>{
        if(!State._pendingBackup) return;
        const res = await importBackupMerge(State._pendingBackup);
        if(Drive.connected) await pushToDrive();
        alert(`Restored ${res.restoredLogs} day(s), ${res.restoredWorkouts} workout(s), ${res.restoredExercises} exercise(s) that were missing. Nothing you already had was overwritten.`);
        State._pendingBackup = null;
        await init();
      });
      preview.querySelector("[data-import-replace]").addEventListener("click", async ()=>{
        if(!State._pendingBackup) return;
        if(confirm("This discards everything currently stored on this device and replaces it with the backup file. This can't be undone. Continue?")){
          await importAllData(State._pendingBackup);
          if(Drive.connected) await pushToDrive();
          State._pendingBackup = null;
          await init();
        }
      });
    } catch(e){
      preview.innerHTML = `<p style="font-size:12px;color:var(--red);margin-top:8px;">${esc(e.message)}</p>`;
    }
  }));

  wireEditorEvents(el);
}

/* ---------------- WORKOUT EDITOR ---------------- */
function renderWorkoutEditor(){
  const q = (State.editorFilter.q||"").toLowerCase();
  const kindFilter = State.editorFilter.kind||"all";
  const list = Object.entries(Lib.workouts).filter(([id,w])=>{
    if(kindFilter!=="all" && w.kind!==kindFilter) return false;
    if(q && !w.name.toLowerCase().includes(q)) return false;
    return true;
  }).sort((a,b)=>a[1].name.localeCompare(b[1].name));

  const editing = State.editingWorkoutId;
  const editingIsNew = editing==="__new__";
  let w;
  if(State._workoutDraft && (editingIsNew || editing===State._workoutDraftId)){
    w = State._workoutDraft;
  } else if(editingIsNew){
    w = {name:"", kind:"strengthblock", desc:"", bodyGroup:"upper", exercises:[], platform:"Rouvy (Indoor)", zoneText:"", timeMin:30, estMiles:""};
  } else if(editing){
    w = Lib.workouts[editing];
  } else {
    w = null;
  }

  return `
  <div class="editor-layout">
    <div>
      <div class="card" style="padding:16px;">
        <div class="editor-search">
          <input type="text" placeholder="Search workouts..." id="wk-search" value="${esc(State.editorFilter.q||"")}">

            <div class="lib-row ${editing===id?'active':''}" data-editworkout="${id}">
              ${typeIconChip(item)}

                <div class="lr-name">${esc(item.name)}</div>
                <div class="lr-meta">
                  <span class="tag-chip">${item.kind==='cycling'?'Cycling':(item.kind==='run'?'Run':'Strength')}</span>
                  ${item.platform?`<span class="tag-chip">${esc(item.platform)}</span>`:''}
                  ${item.kind==='strengthblock'?(item.exercises||[]).length+' exercises':fmtHrs(item.timeMin)}

        <div class="field"><label>Duration (min)</label><input type="number" id="wf-time" value="${w.timeMin||0}"></div>
        <div class="field"><label>Est. Distance (mi)</label><input type="number" id="wf-miles" value="${w.estMiles||''}"></div>
        <div class="field" id="wf-tss-field" style="display:${/rouvy/i.test(w.platform||'')?'flex':'none'};"><label>Target TSS</label><input type="number" min="0" id="wf-tss" value="${w.targetTSS||''}" placeholder="e.g. 55"></div>
        <div class="field wide" id="wf-rouvyurl-field" style="display:${/rouvy/i.test(w.platform||'')?'flex':'none'};"><label>Rouvy Workout URL</label><input type="url" id="wf-rouvyurl" value="${esc(w.url||'')}" placeholder="https://riders.rouvy.com/workouts/..."></div>
      ` : isRun ? `
        <div class="field"><label>Target Pace / Effort</label><input type="text" id="wf-zone" value="${esc(w.paceText||'')}" placeholder="Easy conversational pace · RPE 3–4"></div>
        <div class="field"><label>Duration (min)</label><input type="number" id="wf-time" value="${w.timeMin||0}"></div>
        <div class="field"><label>Est. Distance (mi)</label><input type="number" id="wf-miles" value="${w.estMiles||''}"></div>
      ` : `
        <div class="field"><label>Body Group</label>
          <select id="wf-bodygroup">${BODY_GROUPS.map(g=>`<option value="${g}" ${w.bodyGroup===g?'selected':''}>${g}</option>`).join("")}</select>
        </div>
      `}
      <div class="field wide"><label>Description</label><textarea id="wf-desc">${esc(w.desc||'')}</textarea></div>
    </div>

    ${!isRideOrRun ? `
    <div class="section-title">Exercises <span style="font-weight:400; text-transform:none; letter-spacing:0; color:var(--grey-600); margin-left:8px;">— est. duration updates automatically: <b id="wf-live-time">${fmtHrs(liveTime)}</b></span></div>
    <div id="wf-exercise-list">
      ${(w.exercises||[]).map((ref,i)=>{
        const ex = Lib.exercises[ref.exId];
        const n = (w.exercises||[]).length;
        return `<div class="exercise-row-editor" data-exrow="${i}">
          <div style="display:flex; flex-direction:column; gap:2px;">
            <button data-reorder-libex="${i}" data-dir="-1" ${i===0?'disabled':''} style="border:1px solid var(--grey-200); background:#fff; border-radius:4px; width:20px; height:18px; font-size:10px; cursor:pointer; color:var(--grey-600); ${i===0?'opacity:.3;':''}">▲</button>
            <button data-reorder-libex="${i}" data-dir="1" ${i===n-1?'disabled':''} style="border:1px solid var(--grey-200); background:#fff; border-radius:4px; width:20px; height:18px; font-size:10px; cursor:pointer; color:var(--grey-600); ${i===n-1?'opacity:.3;':''}">▼</button>
          </div>
          <div style="flex:1;">
            <div style="font-weight:700; font-size:13px;">${esc(ex?ex.name:ref.exId)}</div>
            <div style="font-size:11px; color:var(--grey-600);">${esc(ex?ex.bodyGroup:'')}</div>
          </div>
          <div style="display:flex; gap:6px; align-items:center;">
            <input type="text" data-exsets="${i}" value="${esc(ref.sets)}" style="width:44px; border:1px solid var(--grey-200); border-radius:4px; padding:4px 6px; font-size:12px;"> sets ×
            <input type="text" data-exreps="${i}" value="${esc(ref.reps)}" style="width:80px; border:1px solid var(--grey-200); border-radius:4px; padding:4px 6px; font-size:12px;">
            <button data-removeex="${i}" style="border:none;background:none;color:var(--red);cursor:pointer;font-size:16px;">✕</button>
          </div>
        </div>`;
      }).join("")}
    </div>
    <p style="font-size:11px; color:var(--grey-600); margin-top:6px;">Use the ▲▼ arrows to permanently reorder how these exercises appear whenever this workout is scheduled.</p>
    <div style="display:flex; gap:8px; margin-top:10px;">
      <select id="wf-add-exercise" style="flex:1; border:1.5px solid var(--grey-200); border-radius:var(--radius-sm); padding:8px 10px; font-size:13px;">
        <option value="">Add exercise from library…</option>
        ${Object.entries(Lib.exercises).sort((a,b)=>a[1].name.localeCompare(b[1].name)).map(([eid,e])=>`<option value="${eid}">${esc(e.name)} (${e.bodyGroup})</option>`).join("")}
      </select>
      <button class="btn btn-ghost" id="wf-add-exercise-btn">Add</button>
    </div>
    ` : ""}

    <div class="save-row" style="margin-top:16px;">
      <button class="btn btn-primary" data-save-workout="${id}" data-isnew="${isNew?'1':'0'}">Save to library</button>
      <button class="btn btn-ghost" data-cancel-workout="1">Cancel</button>
      <span class="save-tick" data-tick="workoutform">✓ Saved</span>
    </div>
  </div>`;
}

/* ---------------- EXERCISE EDITOR ---------------- */
function renderExerciseEditor(){
  const q = (State.editorFilter.q||"").toLowerCase();
  const bg = State.editorFilter.bodyGroup||"all";
  const bp = State.editorFilter.bodyPart||"all";
  const list = Object.entries(Lib.exercises).filter(([id,e])=>{
    if(bg!=="all" && e.bodyGroup!==bg) return false;
    if(bp!=="all" && !(e.bodyParts||[]).includes(bp)) return false;
    if(q && !e.name.toLowerCase().includes(q)) return false;
    return true;
  }).sort((a,b)=>a[1].name.localeCompare(b[1].name));

  const editing = State.editingExerciseId;
  const editingIsNew = editing==="__new__";
  const ex = editingIsNew ? {name:"", desc:"", bodyGroup:"upper", bodyParts:[], sets:"2", reps:"10"} : (editing ? Lib.exercises[editing] : null);

  return `
  <div class="editor-layout">
    <div>
      <div class="card" style="padding:16px;">
        <div class="editor-search">
          <input type="text" placeholder="Search exercises..." id="ex-search" value="${esc(State.editorFilter.q||"")}">
          <div>
            <div style="font-size:10.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--grey-600); font-weight:700; margin-bottom:5px;">Body Group</div>
            <div class="filter-chips">
              <button class="filter-chip ${bg==='all'?'active':''}" data-exgroup="all">All</button>
              ${BODY_GROUPS.map(g=>`<button class="filter-chip ${bg===g?'active':''}" data-exgroup="${g}">${g}</button>`).join("")}
            </div>
          </div>
          <div>
            <div style="font-size:10.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--grey-600); font-weight:700; margin:8px 0 5px;">Body Part</div>
            <div class="filter-chips">
              <button class="filter-chip ${bp==='all'?'active':''}" data-expart="all">All</button>
              ${BODY_PARTS.map(g=>`<button class="filter-chip ${bp===g?'active':''}" data-expart="${g}">${g}</button>`).join("")}
            </div>
          </div>
        </div>
        <button class="btn btn-primary" style="width:100%; margin:10px 0;" data-new-exercise="1">+ New Exercise</button>
        <div class="lib-list">
          ${list.map(([id,item])=>`
            <div class="lib-row ${editing===id?'active':''}" data-editexercise="${id}">
              <div style="width:30px; height:30px; border-radius:9px; background:var(--indigo-pale); color:var(--indigo); display:flex; align-items:center; justify-content:center; flex-shrink:0;">${iconForExercise(item).replace('<svg ','<svg style="width:16px;height:16px;" ')}</div>
              <div style="flex:1; min-width:0;">
                <div class="lr-name">${esc(item.name)}</div>
                <div class="lr-meta"><span class="tag-chip">${item.bodyGroup}</span>${(item.bodyParts||[]).join(", ")}</div>
              </div>
            </div>`).join("")}
          ${!list.length?`<p style="font-size:12px;color:var(--grey-600);">No matches.</p>`:''}
        </div>
      </div>
    </div>
    <div>
      ${ex ? renderExerciseForm(editing, ex, editingIsNew) : `<div class="card empty-state"><h3>Select an exercise</h3><p>Choose one from the list, or create a new one.</p></div>`}
    </div>
  </div>`;
}

function renderExerciseForm(id, ex, isNew){
  return `
  <div class="card">
    <div class="card-header"><h2>${isNew?'New Exercise':'Edit Exercise'}</h2>${!isNew?`<button class="btn btn-ghost" data-delete-exercise="${id}" style="color:var(--red); border-color:var(--red-pale);">Delete</button>`:''}</div>
    <div class="field-grid">
      <div class="field wide"><label>Exercise Name</label><input type="text" id="ef-name" value="${esc(ex.name)}"></div>
      <div class="field"><label>Body Group</label><select id="ef-bodygroup">${BODY_GROUPS.map(g=>`<option value="${g}" ${ex.bodyGroup===g?'selected':''}>${g}</option>`).join("")}</select></div>
      <div class="field"><label>Body Part(s) — comma separated</label><input type="text" id="ef-bodyparts" value="${esc((ex.bodyParts||[]).join(', '))}" placeholder="chest, arms"></div>
      <div class="field"><label>Target Sets</label><input type="text" id="ef-sets" value="${esc(ex.sets||'2')}"></div>
      <div class="field"><label>Target Reps</label><input type="text" id="ef-reps" value="${esc(ex.reps||'10')}"></div>
      <div class="field wide"><label>Description</label><textarea id="ef-desc">${esc(ex.desc||'')}</textarea></div>
    </div>
    <div class="save-row" style="margin-top:14px;">
      <button class="btn btn-primary" data-save-exercise="${id}" data-isnew="${isNew?'1':'0'}">Save to library</button>
      <button class="btn btn-ghost" data-cancel-exercise="1">Cancel</button>
      <span class="save-tick" data-tick="exerciseform">✓ Saved</span>
    </div>
    <div class="info-callout">Once saved, this exercise becomes available to add into any Workout from the "Add exercise from library" list.</div>
  </div>`;
}

/* ---------------- WIRING ---------------- */
function wireEditorEvents(el){
  el.querySelectorAll("[data-editortab]").forEach(b=>b.addEventListener("click",()=>{
    State.editorTab=b.dataset.editortab; State.editorFilter={q:"",bodyGroup:"all",bodyPart:"all",kind:"all"};
    State.editingExerciseId=null; State.editingWorkoutId=null; renderTabContent();
  }));

  /* workouts */
  el.querySelectorAll("[data-wkkind]").forEach(b=>b.addEventListener("click",()=>{ State.editorFilter.kind=b.dataset.wkkind; renderTabContent(); }));
  const wkSearch = el.querySelector("#wk-search");
  if(wkSearch) wkSearch.addEventListener("input", ()=>{ State.editorFilter.q=wkSearch.value; renderTabContent(); setTimeout(()=>{const f=document.getElementById("wk-search"); if(f){f.focus(); f.selectionStart=f.selectionEnd=f.value.length;}},0); });
  el.querySelectorAll("[data-new-workout]").forEach(b=>b.addEventListener("click",()=>{ State.editingWorkoutId="__new__"; State._workoutDraft=null; State._workoutDraftId=null; renderTabContent(); }));
  el.querySelectorAll("[data-editworkout]").forEach(b=>b.addEventListener("click",()=>{ State.editingWorkoutId=b.dataset.editworkout; State._workoutDraft=null; State._workoutDraftId=null; renderTabContent(); }));
  el.querySelectorAll("[data-cancel-workout]").forEach(b=>b.addEventListener("click",()=>{ State.editingWorkoutId=null; State._workoutDraft=null; State._workoutDraftId=null; renderTabContent(); }));
  el.querySelectorAll("[data-removeex]").forEach(b=>b.addEventListener("click",()=>{
    const w = syncFormIntoDraft(); w.exercises.splice(parseInt(b.dataset.removeex),1); renderTabContent();
  }));
  const addExBtn = el.querySelector("#wf-add-exercise-btn");
  if(addExBtn) addExBtn.addEventListener("click",()=>{
    const sel = document.getElementById("wf-add-exercise");
    if(!sel.value) return;
    const w = syncFormIntoDraft();
    const ex = Lib.exercises[sel.value];
    w.exercises.push({exId:sel.value, sets:ex.sets||"2", reps:ex.reps||"10"});
    renderTabContent();
  });
  const platformInput = el.querySelector("[data-platform-watch]");
  if(platformInput) platformInput.addEventListener("input", ()=>{
    const isRouvy = /rouvy/i.test(platformInput.value);
    const tssField = document.getElementById("wf-tss-field"), urlField = document.getElementById("wf-rouvyurl-field");
    if(tssField) tssField.style.display = isRouvy ? "flex" : "none";
    if(urlField) urlField.style.display = isRouvy ? "flex" : "none";
  });
  el.querySelectorAll("[data-choice-for]").forEach(btn=>btn.addEventListener("click",()=>{
    const targetId = btn.dataset.choiceFor, val = btn.dataset.choiceValue;
    const hidden = document.getElementById(targetId);
    if(!hidden) return;
    hidden.value = val;
    if(targetId==="wf-kind"){
      const w = syncFormIntoDraft();
      w.kind = val;
      if(w.kind==="cycling"){ w.platform = w.platform || "Rouvy (Indoor)"; w.zoneText = w.zoneText || ""; w.timeMin = w.timeMin || 30; }
      else if(w.kind==="run"){ w.paceText = w.paceText || "Easy conversational pace · RPE 3–4"; w.timeMin = w.timeMin || 30; w.platform = "Outdoor"; }
      else { w.exercises = w.exercises || []; w.bodyGroup = w.bodyGroup || "upper"; }
      renderTabContent();
    } else {
      btn.parentElement.querySelectorAll(".choice-btn").forEach(b=>b.classList.toggle("active", b===btn));
    }
  }));
  el.querySelectorAll("[data-reorder-libex]").forEach(btn=>btn.addEventListener("click",()=>{
    const w = syncFormIntoDraft();
    const i = parseInt(btn.dataset.reorderLibex), dir = parseInt(btn.dataset.dir);
    const j = i+dir;
    if(j<0 || j>=w.exercises.length) return;
    [w.exercises[i], w.exercises[j]] = [w.exercises[j], w.exercises[i]];
    renderTabContent();
  }));
  el.querySelectorAll("[data-save-workout]").forEach(b=>b.addEventListener("click", saveWorkoutFromForm));
  el.querySelectorAll("[data-delete-workout]").forEach(b=>b.addEventListener("click", async ()=>{
    if(confirm("Delete this workout from the library? Any scheduled days using it will show a missing-workout notice until reassigned.")){
      await deleteWorkout(b.dataset.deleteWorkout); State.editingWorkoutId=null; renderTabContent();
    }
  }));

  /* exercises */
  el.querySelectorAll("[data-exgroup]").forEach(b=>b.addEventListener("click",()=>{ State.editorFilter.bodyGroup=b.dataset.exgroup; renderTabContent(); }));
  el.querySelectorAll("[data-expart]").forEach(b=>b.addEventListener("click",()=>{ State.editorFilter.bodyPart=b.dataset.expart; renderTabContent(); }));
  const exSearch = el.querySelector("#ex-search");
  if(exSearch) exSearch.addEventListener("input", ()=>{ State.editorFilter.q=exSearch.value; renderTabContent(); setTimeout(()=>{const f=document.getElementById("ex-search"); if(f){f.focus(); f.selectionStart=f.selectionEnd=f.value.length;}},0); });
  el.querySelectorAll("[data-new-exercise]").forEach(b=>b.addEventListener("click",()=>{ State.editingExerciseId="__new__"; renderTabContent(); }));
  el.querySelectorAll("[data-editexercise]").forEach(b=>b.addEventListener("click",()=>{ State.editingExerciseId=b.dataset.editexercise; renderTabContent(); }));
  el.querySelectorAll("[data-cancel-exercise]").forEach(b=>b.addEventListener("click",()=>{ State.editingExerciseId=null; renderTabContent(); }));
  el.querySelectorAll("[data-save-exercise]").forEach(b=>b.addEventListener("click", saveExerciseFromForm));
  el.querySelectorAll("[data-delete-exercise]").forEach(b=>b.addEventListener("click", async ()=>{
    if(confirm("Delete this exercise from the library? Workouts using it will show a placeholder until you replace it.")){
      await deleteExercise(b.dataset.deleteExercise); State.editingExerciseId=null; renderTabContent();
    }
  }));
}

function getEditingWorkoutDraft(){
  const id = State.editingWorkoutId;
  if(State._workoutDraft && State._workoutDraftId===id) return State._workoutDraft;
  const base = id==="__new__" ? {name:"",kind:"strengthblock",desc:"",bodyGroup:"upper",exercises:[]} : JSON.parse(JSON.stringify(Lib.workouts[id]));
  base.exercises = base.exercises || [];
  State._workoutDraft = base;
  State._workoutDraftId = id;
  return base;
}
function syncFormIntoDraft(){
  const draft = getEditingWorkoutDraft();
  const nameEl = document.getElementById("wf-name"), descEl = document.getElementById("wf-desc"), kindEl = document.getElementById("wf-kind");
  if(nameEl) draft.name = nameEl.value;
  if(descEl) draft.desc = descEl.value;
  if(kindEl) draft.kind = kindEl.value;
  const bgEl = document.getElementById("wf-bodygroup"); if(bgEl) draft.bodyGroup = bgEl.value;
  const platEl = document.getElementById("wf-platform"); if(platEl) draft.platform = platEl.value;
  const zoneEl = document.getElementById("wf-zone"); if(zoneEl) draft.zoneText = zoneEl.value;
  const timeEl = document.getElementById("wf-time"); if(timeEl) draft.timeMin = parseInt(timeEl.value)||0;
  const milesEl = document.getElementById("wf-miles"); if(milesEl) draft.estMiles = milesEl.value;
  document.querySelectorAll("[data-exsets]").forEach(inp=>{ if(draft.exercises[parseInt(inp.dataset.exsets)]) draft.exercises[parseInt(inp.dataset.exsets)].sets = inp.value; });
  document.querySelectorAll("[data-exreps]").forEach(inp=>{ if(draft.exercises[parseInt(inp.dataset.exreps)]) draft.exercises[parseInt(inp.dataset.exreps)].reps = inp.value; });
  return draft;
}

async function saveWorkoutFromForm(){
  const isNew = document.querySelector("[data-save-workout]").dataset.isnew==="1";
  const idOld = State.editingWorkoutId;
  const kind = document.getElementById("wf-kind").value;
  const name = document.getElementById("wf-name").value.trim() || "Untitled Workout";
  const desc = document.getElementById("wf-desc").value;
  let data;
  if(kind==="cycling"){
    const platformVal = document.getElementById("wf-platform").value;
    data = {
      name, kind, desc,
      platform: platformVal,
      zoneText: document.getElementById("wf-zone").value,
      timeMin: parseInt(document.getElementById("wf-time").value)||30,
      estMiles: document.getElementById("wf-miles").value ? parseFloat(document.getElementById("wf-miles").value) : undefined
    };
    if(/rouvy/i.test(platformVal)){
      const tssEl = document.getElementById("wf-tss"), urlEl = document.getElementById("wf-rouvyurl");
      if(tssEl && tssEl.value) data.targetTSS = parseInt(tssEl.value);
      if(urlEl && urlEl.value) data.url = urlEl.value.trim();
    }
  } else if(kind==="run"){
    data = {
      name, kind, desc, platform:"Outdoor",
      paceText: document.getElementById("wf-zone").value,
      timeMin: parseInt(document.getElementById("wf-time").value)||20,
      estMiles: document.getElementById("wf-miles").value ? parseFloat(document.getElementById("wf-miles").value) : undefined
    };
  } else {
    const draft = syncFormIntoDraft();
    data = {name, kind, desc, bodyGroup:document.getElementById("wf-bodygroup").value, exercises:draft.exercises};
  }
  const id = isNew ? uid("wk") : idOld;
  await saveWorkout(id, data);
  State._workoutDraft = null;
  State._workoutDraftId = null;
  State.editingWorkoutId = null;
  renderTabContent();
}

async function saveExerciseFromForm(){
  const isNew = document.querySelector("[data-save-exercise]").dataset.isnew==="1";
  const idOld = State.editingExerciseId;
  const name = document.getElementById("ef-name").value.trim() || "Untitled Exercise";
  const data = {
    name,
    bodyGroup: document.getElementById("ef-bodygroup").value,
    bodyParts: document.getElementById("ef-bodyparts").value.split(",").map(s=>s.trim()).filter(Boolean),
    sets: document.getElementById("ef-sets").value,
    reps: document.getElementById("ef-reps").value,
    desc: document.getElementById("ef-desc").value
  };
  const id = isNew ? uid("ex") : idOld;
  await saveExercise(id, data);
  State.editingExerciseId = id;
  const tick = document.querySelector(`[data-tick="exerciseform"]`);
  if(tick){ tick.classList.add("show"); setTimeout(()=>tick.classList.remove("show"),1800); }
  renderTabContent();
}

</script>
</body>
</html>
