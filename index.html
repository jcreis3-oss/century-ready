async function renderProgress(){
  const keys = await listKeys("log:");
  const dates = keys.map(k=>k.replace("log:","")).sort();
  const logs = [];
  for(const d of dates){ logs.push(await getLog(d)); }
  const withWeight = State.weightHistory;
  const complianceRows = logs.filter(l=>(l.workouts&&Object.keys(l.workouts).length)||l.bodyweight||(l.nutrition&&Object.keys(l.nutrition).length)).sort((a,b)=>b.date.localeCompare(a.date));

  let sparkline = "";
  if(withWeight.length>=2){
    const w = withWeight.slice(-14);
    const minW=Math.min(...w.map(x=>x.weight)), maxW=Math.max(...w.map(x=>x.weight));
    const range=Math.max(1,maxW-minW);
    const pts = w.map((x,i)=>{const px=(i/(w.length-1))*580+10; const py=90-((x.weight-minW)/range)*70; return `${px},${py}`;}).join(" ");
    sparkline = `<svg class="sparkline" viewBox="0 0 600 100" preserveAspectRatio="none">
      <polyline points="${pts}" fill="none" stroke="var(--teal)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      ${w.map((x,i)=>{const px=(i/(w.length-1))*580+10; const py=90-((x.weight-minW)/range)*70; return `<circle cx="${px}" cy="${py}" r="3" fill="var(--navy)"/>`;}).join("")}
    </svg><div style="display:flex; justify-content:space-between; font-size:11px; color:var(--grey-600);"><span>${esc(fmtDate(w[0].date))} · ${w[0].weight} lb</span><span>${esc(fmtDate(w[w.length-1].date))} · ${w[w.length-1].weight} lb</span></div>`;
  } else {
    sparkline = `<p style="color:var(--grey-600); font-size:13px;">Log body weight on the Daily Check-In (Today tab) a few times to see a trend line here.</p>`;
  }

  return `
  <div class="two-col">
    <div class="card"><div class="card-header"><h2>Body Weight Trend</h2><span class="meta">Last 14 logged entries</span></div>${sparkline}</div>
    <div class="card"><div class="card-header"><h2>Plan Snapshot</h2></div>
      <div class="calc-box">
        <div class="cline"><span>Days logged</span><span>${complianceRows.length}</span></div>
        <div class="cline"><span>Days into plan</span><span>${Math.max(0,daysBetween(Plan.start, todayISO())+1)} of ${allCalendarDates().length}</span></div>
        <div class="cline"><span>Days to race</span><span>${daysUntilEvent()}</span></div>
      </div>
    </div>
  </div>
  <div class="card"><div class="card-header"><h2>Logged Days</h2><span class="meta">Most recent first</span></div>
    ${complianceRows.length ? `<table class="progress-table"><thead><tr><th>Date</th><th>Workout Entries</th><th>Weight</th><th>Sleep</th><th>Nutrition Logged</th><th>Notes</th></tr></thead><tbody>
      ${complianceRows.map(l=>`<tr><td>${esc(fmtDate(l.date))}</td><td>${l.workouts?Object.keys(l.workouts).length:0}</td><td>${l.bodyweight?l.bodyweight+' lb':'—'}</td><td>${l.sleep?l.sleep+' hr':'—'}</td><td>${l.nutrition&&Object.keys(l.nutrition).length?(l.nutrition.kcal||'—')+' kcal':'—'}</td><td style="max-width:220px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${esc(l.notes||'')}</td></tr>`).join("")}
    </tbody></table>` : `<div class="empty-state"><h3>No entries yet</h3><p>Log a workout or check-in on the Today tab and it will show up here.</p></div>`}
  </div>`;
}

/* ============================================================
   EVENT WIRING
   ============================================================ */
function wireTabEvents(){
  const el = document.getElementById("tabcontent");
  if(!el) return;

  el.querySelectorAll("[data-toggle]").forEach(h=>h.addEventListener("click",(e)=>{
    if(e.target.closest("[data-reorder-workout]")) return;
    const u=h.dataset.toggle; State._openItems[u]=!State._openItems[u];
    const item=document.querySelector(`.workout-item[data-uid="${u}"]`);
    item.querySelector(".wi-body").classList.toggle("open"); item.querySelector(".chev").classList.toggle("open");
  }));
  el.querySelectorAll("[data-selectday]").forEach(p=>p.addEventListener("click",()=>{ State.selectedDate=p.dataset.selectday; renderTabContent(); }));
  el.querySelectorAll("[data-toggleweek]").forEach(h=>h.addEventListener("click",()=>{ const n=parseInt(h.dataset.toggleweek); State.openWeek=State.openWeek===n?null:n; renderTabContent(); }));
  el.querySelectorAll("[data-save]").forEach(btn=>btn.addEventListener("click",async()=>{
    const {date,slotKey}=parseUid(btn.dataset.save);
    await saveWorkoutEntry(date, slotKey, btn.dataset.save);
  }));
  el.querySelectorAll("[data-save-nutri]").forEach(btn=>btn.addEventListener("click",()=>saveNutrition(btn.dataset.saveNutri)));
  el.querySelectorAll("[data-save-checkin]").forEach(btn=>btn.addEventListener("click",()=>saveCheckin(btn.dataset.saveCheckin)));
  el.querySelectorAll("[data-save-profile]").forEach(btn=>btn.addEventListener("click",saveProfile));

  el.querySelectorAll("[data-toggle-sub]").forEach(btn=>btn.addEventListener("click",()=>{
    const u="sub_"+btn.dataset.toggleSub; State._openItems[u]=!State._openItems[u]; renderTabContent();
  }));
  el.querySelectorAll("[data-subsearch]").forEach(inp=>inp.addEventListener("input",()=>{
    State.editorFilter.subQ = inp.value; renderTabContent();
    setTimeout(()=>{ const f=document.querySelector(`[data-subsearch]`); if(f){ f.focus(); f.selectionStart=f.selectionEnd=f.value.length; } },0);
  }));
  el.querySelectorAll("[data-pick-sub]").forEach(btn=>btn.addEventListener("click",()=>{
    const {date,slotKey}=parseUid(btn.dataset.pickSub);
    substituteWorkout(date, slotKey, btn.dataset.workoutid);
    State._openItems["sub_"+btn.dataset.pickSub]=false;
    renderTabContent();
  }));
  el.querySelectorAll("[data-revert-slot]").forEach(btn=>btn.addEventListener("click",()=>{
    const {date,slotKey}=parseUid(btn.dataset.revertSlot);
    revertSlot(date, slotKey); renderTabContent();
  }));
  el.querySelectorAll("[data-remove-added]").forEach(btn=>btn.addEventListener("click",()=>{
    const {date,slotKey}=parseUid(btn.dataset.removeAdded);
    removeAddedWorkout(date, slotKey); renderTabContent();
  }));
  el.querySelectorAll("[data-reorder-workout]").forEach(btn=>btn.addEventListener("click",(e)=>{
    e.stopPropagation();
    const {date,slotKey}=parseUid(btn.dataset.reorderWorkout);
    reorderDayWorkouts(date, slotKey, parseInt(btn.dataset.dir));
    renderTabContent();
  }));
  el.querySelectorAll("[data-reorder-ex]").forEach(btn=>btn.addEventListener("click",(e)=>{
    e.stopPropagation();
    const {date,slotKey}=parseUid(btn.dataset.reorderEx);
    reorderExercisesInSlot(date, slotKey, parseInt(btn.dataset.origidx), parseInt(btn.dataset.dir));
    renderTabContent();
  }));
  el.querySelectorAll("[data-toggle-addworkout]").forEach(btn=>btn.addEventListener("click",()=>{
    State._openItems["addwk_"+btn.dataset.toggleAddworkout] = !State._openItems["addwk_"+btn.dataset.toggleAddworkout];
    renderTabContent();
  }));
  el.querySelectorAll("[data-addwk-search]").forEach(inp=>inp.addEventListener("input",()=>{
    State.editorFilter.addWkQ = inp.value; renderTabContent();
    setTimeout(()=>{ const f=document.querySelector(`[data-addwk-search]`); if(f){ f.focus(); f.selectionStart=f.selectionEnd=f.value.length; } },0);
  }));
  el.querySelectorAll("[data-addwk-kind]").forEach(btn=>btn.addEventListener("click",()=>{ State.editorFilter.addWkKind=btn.dataset.addwkKind; renderTabContent(); }));
  el.querySelectorAll("[data-pick-add]").forEach(btn=>btn.addEventListener("click",()=>{
    addWorkoutToDay(btn.dataset.date, btn.dataset.workoutid);
    State._openItems["addwk_"+btn.dataset.date]=false;
    renderTabContent();
  }));

  el.querySelectorAll("[data-target]").forEach(inp=>inp.addEventListener("change", async ()=>{
    const {date,slotKey}=parseUid(inp.dataset.uid); const exIdx=parseInt(inp.dataset.exidx);
    const wrap=document.querySelector(`.workout-item[data-uid="${inp.dataset.uid}"]`);
    const setsInp=wrap.querySelector(`[data-target="sets"][data-exidx="${exIdx}"]`);
    const repsInp=wrap.querySelector(`[data-target="reps"][data-exidx="${exIdx}"]`);
    await setTempExerciseTarget(date, slotKey, exIdx, setsInp.value, repsInp.value);
    renderTabContent();
  }));
  el.querySelectorAll("[data-reset-target]").forEach(btn=>btn.addEventListener("click", async ()=>{
    const {date,slotKey}=parseUid(btn.dataset.resetTarget); const exIdx=parseInt(btn.dataset.exidx);
    const log=await getLog(date); if(log.targetOverrides) delete log.targetOverrides[slotKey+"_"+exIdx];
    await saveLog(date, log); renderTabContent();
  }));

  el.querySelectorAll("[data-open-skip]").forEach(btn=>btn.addEventListener("click",()=>{ State._openModal="skip"; State._modalDate=btn.dataset.openSkip; renderModalRoot(); }));
  el.querySelectorAll("[data-open-swap]").forEach(btn=>btn.addEventListener("click",()=>{ State._openModal="swap"; State._modalDate=btn.dataset.openSwap; renderModalRoot(); }));
  el.querySelectorAll("[data-swap-day]").forEach(btn=>btn.addEventListener("click",()=>{ State._openModal="swap"; State._modalDate=btn.dataset.swapDay; renderModalRoot(); }));
  el.querySelectorAll("[data-reset-day]").forEach(btn=>btn.addEventListener("click",()=>{ resetDay(btn.dataset.resetDay); render(); }));

  el.querySelectorAll("[data-weather-swap]").forEach(b=>b.addEventListener("click",()=>{
    const date=b.dataset.weatherSwap, slotKey=b.dataset.slot;
    substituteWorkout(date, slotKey, "cy_indoor_recovery");
    renderTabContent();
  }));
  el.querySelectorAll("[data-dismiss-weather-alert]").forEach(b=>b.addEventListener("click",()=>{ State._dismissWeatherAlert=true; renderTabContent(); }));

  el.querySelectorAll("[data-view-toggle]").forEach(b=>b.addEventListener("click",()=>{ State.scheduleView=b.dataset.viewToggle; renderTabContent(); }));
  el.querySelectorAll("[data-cal-nav]").forEach(b=>b.addEventListener("click",()=>{ navCalendarMonth(parseInt(b.dataset.calNav)); renderTabContent(); }));
  el.querySelectorAll("[data-cal-day]").forEach(b=>b.addEventListener("click",()=>{ State.calendarSelectedDate=b.dataset.calDay; renderTabContent(); }));

  el.querySelectorAll("[data-set-start]").forEach(b=>b.addEventListener("click", async ()=>{
    const v = document.getElementById("start-date-input").value;
    if(!v) return;
    if(confirm(`Set the program start date to ${fmtDate(v)}? This will regenerate your schedule and clear any skip/swap/substitution changes you've made.`)){
      await setPlanStart(v);
    }
  }));

  el.querySelectorAll("[data-drive-save-clientid]").forEach(b=>b.addEventListener("click", async ()=>{
    const v = document.getElementById("drive-clientid-input").value.trim();
    if(!v) return;
    await saveDriveClientId(v);
    renderDriveStatus();
  }));
  el.querySelectorAll("[data-drive-connect]").forEach(b=>b.addEventListener("click", connectDrive));
  el.querySelectorAll("[data-drive-sync-now]").forEach(b=>b.addEventListener("click", async ()=>{ if(Drive.dirtySincePush) await pushToDrive(); await pullFromDrive(); renderDriveStatus(); }));
  el.querySelectorAll("[data-drive-disconnect]").forEach(b=>b.addEventListener("click", disconnectDrive));

  wireEditorEvents(el);
}

const BODY_GROUPS = ["upper","lower","core","mobility","recovery"];
const BODY_PARTS = ["chest","back","shoulders","arms","legs","glutes","hips","abs/core","full body"];

function renderEditor(){
  const isWorkouts = State.editorTab==="workouts";
  return `
  <div class="card" style="padding:16px 20px;">
    <div class="pill-toggle">
      <button class="${isWorkouts?'active':''}" data-editortab="workouts">Workouts</button>
      <button class="${!isWorkouts?'active':''}" data-editortab="exercises">Exercises</button>
    </div>
    <p style="font-size:12.5px; color:var(--grey-600); margin-top:10px;">Edits here are permanent and apply everywhere that workout or exercise is used in the plan. Includes Rouvy library references (search "Rouvy" or filter by platform) alongside your custom entries.</p>
  </div>
  ${isWorkouts ? renderWorkoutEditor() : renderExerciseEditor()}
  `;
}

/* ---------------- WORKOUT EDITOR ---------------- */
function renderWorkoutEditor(){
  const q = (State.editorFilter.q||"").toLowerCase();
  const kindFilter = State.editorFilter.kind||"all";
  const list = Object.entries(Lib.workouts).filter(([id,w])=>{
    if(kindFilter!=="all" && w.kind!==kindFilter) return false;
    if(q && !w.name.toLowerCase().includes(q)) return false;
    return true;
  }).sort((a,b)=>a[1].name.localeCompare(b[1].name));

  const editing = State.editingWorkoutId;
  const editingIsNew = editing==="__new__";
  let w;
  if(State._workoutDraft && (editingIsNew || editing===State._workoutDraftId)){
    w = State._workoutDraft;
  } else if(editingIsNew){
    w = {name:"", kind:"strengthblock", desc:"", bodyGroup:"upper", exercises:[], platform:"Rouvy (Indoor)", zoneText:"", timeMin:30, estMiles:""};
  } else if(editing){
    w = Lib.workouts[editing];
  } else {
    w = null;
  }

  return `
  <div class="editor-layout">
    <div>
      <div class="card" style="padding:16px;">
        <div class="editor-search">
          <input type="text" placeholder="Search workouts..." id="wk-search" value="${esc(State.editorFilter.q||"")}">
          <div class="filter-chips">
            ${["all","cycling","strengthblock"].map(k=>`<button class="filter-chip ${kindFilter===k?'active':''}" data-wkkind="${k}">${k==='all'?'All':(k==='cycling'?'Cycling':'Strength')}</button>`).join("")}
          </div>
        </div>
        <button class="btn btn-primary" style="width:100%; margin-bottom:10px;" data-new-workout="1">+ New Workout</button>
        <div class="lib-list">
          ${list.map(([id,item])=>`
            <div class="lib-row ${editing===id?'active':''}" data-editworkout="${id}">
              <div class="lr-name">${esc(item.name)}</div>
              <div class="lr-meta">
                <span class="tag-chip">${item.kind==='cycling'?'Cycling':'Strength'}</span>
                ${item.platform?`<span class="tag-chip">${esc(item.platform)}</span>`:''}
                ${item.kind==='strengthblock'?(item.exercises||[]).length+' exercises':fmtHrs(item.timeMin)}
              </div>
            </div>`).join("")}
          ${!list.length?`<p style="font-size:12px;color:var(--grey-600);">No matches.</p>`:''}
        </div>
      </div>
    </div>
    <div>
      ${w ? renderWorkoutForm(editing, w, editingIsNew) : `<div class="card empty-state"><h3>Select a workout</h3><p>Choose one from the list, or create a new one.</p></div>`}
    </div>
  </div>`;
}

      <div class="field"><label>Body Part(s) — comma separated</label><input type="text" id="ef-bodyparts" value="${esc((ex.bodyParts||[]).join(', '))}" placeholder="chest, arms"></div>
      <div class="field"><label>Target Sets</label><input type="text" id="ef-sets" value="${esc(ex.sets||'2')}"></div>
      <div class="field"><label>Target Reps</label><input type="text" id="ef-reps" value="${esc(ex.reps||'10')}"></div>
      <div class="field wide"><label>Description</label><textarea id="ef-desc">${esc(ex.desc||'')}</textarea></div>
    </div>
    <div class="save-row" style="margin-top:14px;">
      <button class="btn btn-primary" data-save-exercise="${id}" data-isnew="${isNew?'1':'0'}">Save to library</button>
      <button class="btn btn-ghost" data-cancel-exercise="1">Cancel</button>
      <span class="save-tick" data-tick="exerciseform">✓ Saved</span>
    </div>
    <div class="info-callout">Once saved, this exercise becomes available to add into any Workout from the "Add exercise from library" list.</div>
  </div>`;
}

/* ---------------- WIRING ---------------- */
function wireEditorEvents(el){
  el.querySelectorAll("[data-editortab]").forEach(b=>b.addEventListener("click",()=>{
    State.editorTab=b.dataset.editortab; State.editorFilter={q:"",bodyGroup:"all",bodyPart:"all",kind:"all"};
    State.editingExerciseId=null; State.editingWorkoutId=null; renderTabContent();
  }));

  /* workouts */
  el.querySelectorAll("[data-wkkind]").forEach(b=>b.addEventListener("click",()=>{ State.editorFilter.kind=b.dataset.wkkind; renderTabContent(); }));
  const wkSearch = el.querySelector("#wk-search");
  if(wkSearch) wkSearch.addEventListener("input", ()=>{ State.editorFilter.q=wkSearch.value; renderTabContent(); setTimeout(()=>{const f=document.getElementById("wk-search"); if(f){f.focus(); f.selectionStart=f.selectionEnd=f.value.length;}},0); });
  el.querySelectorAll("[data-new-workout]").forEach(b=>b.addEventListener("click",()=>{ State.editingWorkoutId="__new__"; State._workoutDraft=null; State._workoutDraftId=null; renderTabContent(); }));
  el.querySelectorAll("[data-editworkout]").forEach(b=>b.addEventListener("click",()=>{ State.editingWorkoutId=b.dataset.editworkout; State._workoutDraft=null; State._workoutDraftId=null; renderTabContent(); }));
  el.querySelectorAll("[data-cancel-workout]").forEach(b=>b.addEventListener("click",()=>{ State.editingWorkoutId=null; State._workoutDraft=null; State._workoutDraftId=null; renderTabContent(); }));
  el.querySelectorAll("[data-removeex]").forEach(b=>b.addEventListener("click",()=>{
    const w = syncFormIntoDraft(); w.exercises.splice(parseInt(b.dataset.removeex),1); renderTabContent();
  }));
  const addExBtn = el.querySelector("#wf-add-exercise-btn");
  if(addExBtn) addExBtn.addEventListener("click",()=>{
    const sel = document.getElementById("wf-add-exercise");
    if(!sel.value) return;
    const w = syncFormIntoDraft();
    const ex = Lib.exercises[sel.value];
    w.exercises.push({exId:sel.value, sets:ex.sets||"2", reps:ex.reps||"10"});
    renderTabContent();
  });
  const kindSel = el.querySelector("#wf-kind");
  if(kindSel) kindSel.addEventListener("change", ()=>{
    const w = syncFormIntoDraft();
    w.kind = kindSel.value;
    if(w.kind==="cycling"){
      w.platform = w.platform || "Rouvy (Indoor)"; w.zoneText = w.zoneText || ""; w.timeMin = w.timeMin || 30;
    } else {
      w.exercises = w.exercises || []; w.bodyGroup = w.bodyGroup || "upper";
    }
    renderTabContent();
  });
  el.querySelectorAll("[data-reorder-libex]").forEach(btn=>btn.addEventListener("click",()=>{
    const w = syncFormIntoDraft();
    const i = parseInt(btn.dataset.reorderLibex), dir = parseInt(btn.dataset.dir);
    const j = i+dir;
    if(j<0 || j>=w.exercises.length) return;
    [w.exercises[i], w.exercises[j]] = [w.exercises[j], w.exercises[i]];
    renderTabContent();
  }));
  el.querySelectorAll("[data-save-workout]").forEach(b=>b.addEventListener("click", saveWorkoutFromForm));
  el.querySelectorAll("[data-delete-workout]").forEach(b=>b.addEventListener("click", async ()=>{
    if(confirm("Delete this workout from the library? Any scheduled days using it will show a missing-workout notice until reassigned.")){
      await deleteWorkout(b.dataset.deleteWorkout); State.editingWorkoutId=null; renderTabContent();
    }
  }));

  /* exercises */
  el.querySelectorAll("[data-exgroup]").forEach(b=>b.addEventListener("click",()=>{ State.editorFilter.bodyGroup=b.dataset.exgroup; renderTabContent(); }));
  el.querySelectorAll("[data-expart]").forEach(b=>b.addEventListener("click",()=>{ State.editorFilter.bodyPart=b.dataset.expart; renderTabContent(); }));
  const exSearch = el.querySelector("#ex-search");
  if(exSearch) exSearch.addEventListener("input", ()=>{ State.editorFilter.q=exSearch.value; renderTabContent(); setTimeout(()=>{const f=document.getElementById("ex-search"); if(f){f.focus(); f.selectionStart=f.selectionEnd=f.value.length;}},0); });
  el.querySelectorAll("[data-new-exercise]").forEach(b=>b.addEventListener("click",()=>{ State.editingExerciseId="__new__"; renderTabContent(); }));
  el.querySelectorAll("[data-editexercise]").forEach(b=>b.addEventListener("click",()=>{ State.editingExerciseId=b.dataset.editexercise; renderTabContent(); }));
  el.querySelectorAll("[data-cancel-exercise]").forEach(b=>b.addEventListener("click",()=>{ State.editingExerciseId=null; renderTabContent(); }));
  el.querySelectorAll("[data-save-exercise]").forEach(b=>b.addEventListener("click", saveExerciseFromForm));
  el.querySelectorAll("[data-delete-exercise]").forEach(b=>b.addEventListener("click", async ()=>{
    if(confirm("Delete this exercise from the library? Workouts using it will show a placeholder until you replace it.")){
      await deleteExercise(b.dataset.deleteExercise); State.editingExerciseId=null; renderTabContent();
    }
  }));
}

function getEditingWorkoutDraft(){
  const id = State.editingWorkoutId;
  if(State._workoutDraft && State._workoutDraftId===id) return State._workoutDraft;
  const base = id==="__new__" ? {name:"",kind:"strengthblock",desc:"",bodyGroup:"upper",exercises:[]} : JSON.parse(JSON.stringify(Lib.workouts[id]));
  base.exercises = base.exercises || [];
  State._workoutDraft = base;
  State._workoutDraftId = id;
  return base;
}
function syncFormIntoDraft(){
  const draft = getEditingWorkoutDraft();
  const nameEl = document.getElementById("wf-name"), descEl = document.getElementById("wf-desc"), kindEl = document.getElementById("wf-kind");
  if(nameEl) draft.name = nameEl.value;
  if(descEl) draft.desc = descEl.value;
  if(kindEl) draft.kind = kindEl.value;
  const bgEl = document.getElementById("wf-bodygroup"); if(bgEl) draft.bodyGroup = bgEl.value;
  const platEl = document.getElementById("wf-platform"); if(platEl) draft.platform = platEl.value;
  const zoneEl = document.getElementById("wf-zone"); if(zoneEl) draft.zoneText = zoneEl.value;
  const timeEl = document.getElementById("wf-time"); if(timeEl) draft.timeMin = parseInt(timeEl.value)||0;
  const milesEl = document.getElementById("wf-miles"); if(milesEl) draft.estMiles = milesEl.value;
  document.querySelectorAll("[data-exsets]").forEach(inp=>{ if(draft.exercises[parseInt(inp.dataset.exsets)]) draft.exercises[parseInt(inp.dataset.exsets)].sets = inp.value; });
  document.querySelectorAll("[data-exreps]").forEach(inp=>{ if(draft.exercises[parseInt(inp.dataset.exreps)]) draft.exercises[parseInt(inp.dataset.exreps)].reps = inp.value; });
  return draft;
}

async function saveWorkoutFromForm(){
  const isNew = document.querySelector("[data-save-workout]").dataset.isnew==="1";
  const idOld = State.editingWorkoutId;
  const kind = document.getElementById("wf-kind").value;
  const name = document.getElementById("wf-name").value.trim() || "Untitled Workout";
  const desc = document.getElementById("wf-desc").value;
  let data;
  if(kind==="cycling"){
    data = {
      name, kind, desc,
      platform: document.getElementById("wf-platform").value,
      zoneText: document.getElementById("wf-zone").value,
      timeMin: parseInt(document.getElementById("wf-time").value)||30,
      estMiles: document.getElementById("wf-miles").value ? parseFloat(document.getElementById("wf-miles").value) : undefined
    };
  } else {
    const draft = syncFormIntoDraft();
    data = {name, kind, desc, bodyGroup:document.getElementById("wf-bodygroup").value, exercises:draft.exercises};
  }
  const id = isNew ? uid("wk") : idOld;
  await saveWorkout(id, data);
  State._workoutDraft = null;
  State._workoutDraftId = null;
  State.editingWorkoutId = id;
  const tick = document.querySelector(`[data-tick="workoutform"]`);
  if(tick){ tick.classList.add("show"); setTimeout(()=>tick.classList.remove("show"),1800); }
  renderTabContent();
}

async function saveExerciseFromForm(){
  const isNew = document.querySelector("[data-save-exercise]").dataset.isnew==="1";
  const idOld = State.editingExerciseId;
  const name = document.getElementById("ef-name").value.trim() || "Untitled Exercise";
  const data = {
    name,
    bodyGroup: document.getElementById("ef-bodygroup").value,
    bodyParts: document.getElementById("ef-bodyparts").value.split(",").map(s=>s.trim()).filter(Boolean),
    sets: document.getElementById("ef-sets").value,
    reps: document.getElementById("ef-reps").value,
    desc: document.getElementById("ef-desc").value
  };
  const id = isNew ? uid("ex") : idOld;
  await saveExercise(id, data);
  State.editingExerciseId = id;
  const tick = document.querySelector(`[data-tick="exerciseform"]`);
  if(tick){ tick.classList.add("show"); setTimeout(()=>tick.classList.remove("show"),1800); }
  renderTabContent();
}

</script>
